<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Techvestor Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0a1628;--navy2:#112240;--blue:#1a73e8;
  --accent:#00c9a7;--bg:#f0f4f8;--card:#fff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --critical:#dc2626;--warning:#d97706;--ok:#16a34a;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.hdr{background:var(--navy);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;height:58px;border-bottom:1px solid rgba(255,255,255,.07)}
.hdr img{height:26px;object-fit:contain}
.hdr-div{width:1px;height:22px;background:rgba(255,255,255,.15)}
.hdr-title{color:#fff;font-weight:700;font-size:14px}
.hdr-sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.upd{color:rgba(255,255,255,.35);font-size:11px}
.abadge{background:rgba(0,201,167,.15);color:var(--accent);border:1px solid rgba(0,201,167,.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;position:sticky;top:58px;z-index:99}
.tabs button{border:none;background:none;padding:13px 15px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Inter',system-ui,sans-serif}
.tabs button:hover{color:var(--text)}
.wrap{padding:22px 18px;max-width:980px;margin:0 auto}
.hero{text-align:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-radius:16px;padding:40px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,201,167,.15),transparent 70%)}
.hero img{height:30px;margin-bottom:14px;filter:brightness(0) invert(1)}
.hero-badge{display:inline-block;background:rgba(0,201,167,.2);color:var(--accent);border:1px solid rgba(0,201,167,.3);padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.hero h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}
.hero p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}
.card p,.card ol{color:#475569;font-size:14px;line-height:1.75}
.card ol{padding-left:18px;line-height:2.1}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;gap:10px}
.trk-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.trk-hdr h2{font-size:18px;font-weight:700;color:var(--text)}
.trk-hdr .sub{color:var(--muted);font-size:13px;margin-top:2px}
.rbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',system-ui,sans-serif}
.tdiv{font-weight:700;font-size:14px;margin-bottom:12px;padding-left:10px;border-left:3px solid}
.tsec{margin-bottom:28px}
.sumbox{border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:14px;color:#334155;line-height:1.65}
.srow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.scard{background:#fff;border-radius:12px;padding:14px 18px;min-width:110px;text-align:center;flex:1 1 110px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sval{font-size:26px;font-weight:800;line-height:1}
.slbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
.slabel{font-weight:700;font-size:11px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px}
.cbox{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:8px}
.ctop{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ctitle{font-weight:600;color:var(--text);font-size:14px}
.cdet{color:var(--muted);font-size:13px}
.badge{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px}
.split{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.twrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--muted);font-weight:600;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
td{padding:9px 12px;border-bottom:1px solid #f8fafc;color:#334155;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.wr{white-space:normal;font-size:12px;color:#475569;max-width:260px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.rc td:first-child{border-left:3px solid var(--critical)}
.rw td:first-child{border-left:3px solid var(--warning)}
.ro td:first-child{border-left:3px solid var(--ok)}
/* TOOLTIP */
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}
[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;z-index:999;pointer-events:none}
/* PERMITTING */
.pc{border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin-right:4px;margin-top:4px;font-weight:500}
.nbox{margin-top:8px;font-size:12px;color:#475569;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px}
/* UTILITIES SUMMARY STAT BOXES */
.util-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:18px;border:2px solid var(--border);border-radius:12px;overflow:hidden}
.util-stat{padding:14px 16px;text-align:center;border-right:1px solid var(--border)}
.util-stat:last-child{border-right:none}
.util-stat .label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.util-stat .value{font-size:32px;font-weight:800;color:var(--text)}
/* ONBOARDING REF TIMELINE SINGLE CARD */
.ref-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ref-card-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ref-table{width:100%;border-collapse:collapse;font-size:13px}
.ref-table th{background:#f8fafc;color:var(--muted);font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:12px}
.ref-table td{padding:8px 12px;border-bottom:1px solid #f8fafc;color:#334155;vertical-align:top}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr:hover td{background:#fafbfc}
/* COMPLAINTS */
.today-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.cc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cc.today{border:2px solid var(--navy);background:#f8faff}
.cc .cd{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.cc .ca{font-weight:700;color:var(--text);font-size:14px;margin-bottom:4px}
.cc .ct{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:6px}
.cc .cx{font-size:13px;color:#475569;line-height:1.5}
.cc .cs{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
/* SECURITY */
.sec-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* STATE */
.stbox{text-align:center;padding:80px 20px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.split{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr}.util-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hdr">
  <img src="https://cdn.prod.website-files.com/67a629b102d54dc82c9044c0/67a62bfeeec34081b307ec39_techvestor-logo-2.png" alt="Techvestor"/>
  <div class="hdr-div"></div>
  <div>
    <div class="hdr-title">Operations Dashboard</div>
    <div class="hdr-sub" id="hdate"></div>
  </div>
  <div class="hdr-right">
    <span class="upd" id="upd"></span>
    <span class="abadge">⟳ Auto-refresh 15m</span>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="content"></div>

<script>
var KEY = "AIzaSyC8Pa8tBIl17GMtA68ltcx-AGlrUvmtcn8";
var REFRESH = 15 * 60 * 1000;
var TODAY = new Date();
var TODAYSTR = TODAY.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
var TODAYDATE = TODAY.toDateString();
document.getElementById("hdate").textContent = "Live · " + TODAYSTR;

var TABS = [
  {id:"home",       label:"🏠 Home",                  color:"#6366f1"},
  {id:"permitting", label:"📋 Permitting",             color:"#f59e0b"},
  {id:"utilities",  label:"⚡ Utilities ERM",          color:"#3b82f6"},
  {id:"onboarding", label:"🏠 Property Onboarding",    color:"#10b981"},
  {id:"vegetation", label:"🌿 Vegetation Audit",       color:"#84cc16"},
  {id:"complaints", label:"📣 Complaints & Incidents", color:"#6366f1"},
  {id:"security",   label:"🔒 Security Monitoring",    color:"#7c3aed"},
];

var CFG = {
  permitting:{sheetId:"1Ex7gyGxpTvbDBQMD2PNfivYbea0YmOEDKO5innwPBZg",color:"#f59e0b",desc:"Expiration tab — permits expiring soon with notes",mode:"permitting",sheets:[{name:"Expiration",range:"Expiration"}]},
  utilities: {sheetId:"1bPlzWPzarOI03QO1_LqUrhlrxM8AMc2MPrQHiYrPCns",color:"#3b82f6",desc:"SUMMARY tab — live utility status overview",mode:"utilities",sheets:[{name:"SUMMARY",range:"SUMMARY"}]},
  onboarding:{sheetId:"13JffxAKNLUaPm2n1iBWNCL48k-7CCEaf4xwu0xgjZN4",color:"#10b981",desc:"Ref Timeline + all property onboarding tabs",mode:"onboarding",sheets:[],refSheet:"Ref Timeline"},
  vegetation: {sheetId:"1omzFAmQLUUk-g9tOd9b3fm9NbnxhXVbnGUQXUb6-6mg",color:"#84cc16",desc:"Lawncare Audit AZ & FL — notes, date captured & timestamp",mode:"vegetation",sheets:[{name:"Lawncare Audit AZ",range:"Lawncare Audit AZ"},{name:"Lawncare Audit FL",range:"Lawncare Audit FL"}]},
  complaints: {sheetId:"1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs",color:"#6366f1",desc:"Neighbor Complaint / Incident Reported by Guest Log",mode:"complaints",sheets:[{name:"Neighbor Complaint/Incident Reported by Guest Log",range:"Neighbor Complaint%2FIncident Reported by Guest Log"}]},
  security:   {sheetId:"1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs",color:"#7c3aed",desc:"Noise Alert Logs — alerts, actions & Hospitable links",mode:"security",sheets:[{name:"Noise Alert Logs",range:"Noise Alert Logs"}]},
};

// ── FETCH ────────────────────────────────────────────────────────────────────
async function fetchSheet(sheetId, range) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "/values/" + encodeURIComponent(range) + "?key=" + KEY;
  var r = await fetch(url);
  if (!r.ok) {
    var b = await r.json().catch(function(){return{};});
    var m = (b.error && b.error.message) || ("HTTP " + r.status);
    if (r.status===403) throw new Error("API key unauthorized: " + m);
    if (r.status===400) throw new Error('Tab "' + range + '" not found. Check exact tab name in sheet.');
    if (r.status===404) throw new Error("Spreadsheet not found or not public.");
    throw new Error(m);
  }
  var data = await r.json();
  var rows = data.values || [];
  if (rows.length < 2) return {headers:[],rows:[],rawRows:rows};
  var headers = rows[0].map(function(h){return(h||"").trim();});
  var dataRows = rows.slice(1).map(function(row){
    var obj={};
    headers.forEach(function(h,i){obj[h]=(row[i]||"").trim();});
    return obj;
  });
  return {headers:headers,rows:dataRows,rawRows:rows};
}

async function fetchMeta(sheetId) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "?key=" + KEY;
  var r = await fetch(url);
  if (!r.ok) throw new Error("Could not load spreadsheet metadata.");
  var data = await r.json();
  return (data.sheets||[])
    .filter(function(s){return s.properties&&!s.properties.hidden;})
    .map(function(s){return s.properties.title;})
    .filter(Boolean);
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fcol(headers,kw){if(!kw)return null;return headers.find(function(h){return h.toLowerCase().includes(kw.toLowerCase());})||null;}
function pdate(str){if(!str)return null;var d=new Date(str);return isNaN(d.getTime())?null:d;}
function ddiff(d){return Math.round((d.getTime()-TODAY.getTime())/86400000);}
function isToday(d){return d&&d.toDateString()===TODAYDATE;}
function badge(level){
  var m={critical:{bg:"#fee2e2",c:"#dc2626",i:"🔴"},warning:{bg:"#fef9c3",c:"#d97706",i:"🟡"},info:{bg:"#eff6ff",c:"#2563eb",i:"🔵"}};
  var s=m[level]||m.info;
  return '<span class="badge" style="background:'+s.bg+';color:'+s.c+'">'+s.i+' '+level.toUpperCase()+'</span>';
}

// ── ANALYSIS ─────────────────────────────────────────────────────────────────
function analyzePermitting(sn,d){
  var h=d.headers,rows=d.rows;
  var dateKey=fcol(h,"expir")||fcol(h,"date");
  var nameKey=fcol(h,"permit")||fcol(h,"address")||fcol(h,"property")||fcol(h,"name")||h[0];
  var statusKey=fcol(h,"status");
  var noteKey=fcol(h,"note")||fcol(h,"action")||fcol(h,"comment");
  var updKey=fcol(h,"updated")||fcol(h,"last update")||fcol(h,"modified");
  var critical=0,warning=0,ok=0,callouts=[],tableRows=[];
  rows.forEach(function(row){
    var name=(nameKey?row[nameKey]:"")||"";
    var status=(statusKey?row[statusKey]:"")||"";
    var note=(noteKey?row[noteKey]:"")||"";
    var updated=(updKey?row[updKey]:"")||"";
    var dateStr=(dateKey?row[dateKey]:"")||"";
    var d2=pdate(dateStr),diff=d2?ddiff(d2):null;
    var level="ok",label="",rowClass="ro";
    if(diff!==null){
      if(diff<0){level="critical";label="EXPIRED";critical++;rowClass="rc";}
      else if(diff<=30){level="critical";label=diff+"d left";critical++;rowClass="rc";}
      else if(diff<=90){level="warning";label=diff+"d left";warning++;rowClass="rw";}
      else{ok++;label=diff+"d left";}
    }else{ok++;}
    if(level==="critical"||level==="warning") callouts.push({level:level,name:name,dateStr:dateStr,label:label,status:status,note:note,updated:updated});
    tableRows.push({rowClass:rowClass,cols:[name,dateStr,label,status,note,updated]});
  });
  callouts.sort(function(a,b){return({critical:0,warning:1}[a.level]||0)-({critical:0,warning:1}[b.level]||0);});
  return {mode:"permitting",
    summary:rows.length===0?"No data.":critical+" critical/expired, "+warning+" expiring ≤90 days, "+ok+" OK of "+rows.length+" total.",
    stats:[{label:"Total",value:rows.length,color:"#f59e0b"},{label:"🔴 Critical",value:critical,color:"#dc2626"},{label:"🟡 Warning",value:warning,color:"#d97706"},{label:"✅ OK",value:ok,color:"#16a34a"}],
    callouts:callouts,tableHeaders:["Permit / Property","Expiration Date","Days Left","Status","Notes","Last Updated"],tableRows:tableRows};
}

function analyzeUtilities(sn,d){
  var h=d.headers,rows=d.rows,rawRows=d.rawRows||[];
  // Detect the summary stat row (first row that has large numbers) vs header
  // The SUMMARY sheet has stat boxes in the first few rows then a proper table below
  // Try to find key summary stat columns
  var totalKey=fcol(h,"total live")||fcol(h,"total");
  var validKey=fcol(h,"validation issue")||fcol(h,"validation");
  var setupKey=fcol(h,"setting up")||fcol(h,"setup issue");
  var ageKey  =fcol(h,"validation age")||fcol(h,"age");

  // Pull summary stats from first data row if they look like numbers
  var summaryStats=null;
  if(rows.length>0){
    var fr=rows[0];
    var tv=totalKey?fr[totalKey]:""; var vv=validKey?fr[validKey]:""; var sv=setupKey?fr[setupKey]:""; var av=ageKey?fr[ageKey]:"";
    if(tv&&!isNaN(parseInt(tv))) summaryStats={total:tv,validation:vv,setup:sv,age:av};
  }

  // Build table from all rows
  var ISSUE=["fail","missing","incomplete","overdue","n/a","tbd","pending","hold","not ","reject","no"];
  var DONE=["complete","done","active","approved","pass","yes","ok","set up","received","signed","validated"];
  var complete=0,pending=0,issues=0;
  var tableRows=rows.map(function(row){
    var all=Object.values(row).join(" ").toLowerCase();
    var rowClass="";
    if(ISSUE.some(function(w){return all.includes(w);})){issues++;rowClass="rw";}
    else if(DONE.some(function(w){return all.includes(w);})){complete++;rowClass="ro";}
    else{pending++;}
    return {rowClass:rowClass,cols:h.map(function(hh){return row[hh]||"";})};
  });
  return {mode:"utilities",summaryStats:summaryStats,
    summary:"SUMMARY — "+rows.length+" records. "+complete+" complete/OK, "+pending+" pending, "+issues+" flagged.",
    stats:[{label:"Total Live Properties",value:summaryStats?summaryStats.total:rows.length,color:"#3b82f6"},{label:"Validation Issues",value:summaryStats?summaryStats.validation:"—",color:"#dc2626"},{label:"Setup Issues",value:summaryStats?summaryStats.setup:"—",color:"#d97706"},{label:"Validated >2 Days",value:summaryStats?summaryStats.age:"—",color:"#f59e0b"}],
    tableHeaders:h,tableRows:tableRows};
}

function analyzeOnboarding(sn,d){
  var h=d.headers,rows=d.rows;
  var nameKey=h[0];
  var ISSUE=["fail","missing","incomplete","overdue","hold","stall","not ","pending","tbd","n/a","reject"];
  var DONE=["complete","done","approved","active","yes","ok","received","signed","passed"];
  var pending=0,complete=0,issues=0,callouts=[],tableRows=[];
  rows.forEach(function(row){
    var name=(row[nameKey]||"").trim();
    if(!name)return;
    var all=Object.values(row).join(" ").toLowerCase();
    var rowClass="";
    if(ISSUE.some(function(w){return all.includes(w);})){issues++;rowClass="rw";var fl=Object.entries(row).filter(function(e){return ISSUE.some(function(w){return e[1].toLowerCase().includes(w);});}).map(function(e){return e[0]+": "+e[1];}).join("; ");callouts.push({level:"warning",title:name,detail:fl||"Needs attention"});}
    else if(DONE.some(function(w){return all.includes(w);})){complete++;rowClass="ro";}
    else{pending++;}
    tableRows.push({rowClass:rowClass,cols:h.slice(0,6).map(function(hh){return row[hh]||"";})});
  });
  return {mode:"onboarding",
    summary:rows.length===0?"No data.":rows.length+" properties — "+complete+" complete, "+pending+" pending, "+issues+" flagged.",
    stats:[{label:"Total",value:rows.length,color:"#10b981"},{label:"✅ Complete",value:complete,color:"#16a34a"},{label:"⏳ Pending",value:pending,color:"#64748b"},{label:"⚠️ Flagged",value:issues,color:"#d97706"}],
    callouts:callouts,tableHeaders:h.slice(0,6),tableRows:tableRows};
}

function parseRefTimeline(rawRows){
  // Row index 0 = original headers (might be blank labels)
  // Row index 1 = actual column names (row 2 in sheet)
  // Rows index 2+ = data
  if(!rawRows||rawRows.length<3)return{colA:"Onboarding Checklist",colB:"SOP Timeframe (Days)",colC:"Stage",items:[]};
  var colHeaders=rawRows[1]||[];
  var colA=(colHeaders[0]||"Onboarding Checklist").trim();
  var colB=(colHeaders[1]||"SOP Timeframe (Days)").trim();
  var colC=(colHeaders[2]||"Stage").trim();
  var items=rawRows.slice(2).map(function(row){
    return {a:(row[0]||"").trim(),b:(row[1]||"").trim(),c:(row[2]||"").trim()};
  }).filter(function(r){return r.a||r.b||r.c;});
  return {colA:colA,colB:colB,colC:colC,items:items};
}

function analyzeVegetation(sn,d){
  var h=d.headers,rows=d.rows;
  var nameKey=fcol(h,"address")||fcol(h,"property")||h[0];
  var statusKey=fcol(h,"status")||fcol(h,"result")||fcol(h,"pass");
  var noteKey=fcol(h,"note")||fcol(h,"comment")||fcol(h,"remark");
  var dateCapKey=fcol(h,"date captured")||fcol(h,"date cap")||fcol(h,"captured");
  var tsKey=fcol(h,"timestamp")||fcol(h,"time stamp");
  var FAIL=["fail","no","issue","overdue","incomplete","missing","needs"];
  var PASS=["pass","yes","ok","complete","done","approved"];
  var pass=0,fail=0,pending=0,callouts=[],tableRows=[];
  // Build display columns: name, status, date captured, timestamp, notes, then others
  var dispH=[];
  [nameKey,statusKey,dateCapKey,tsKey,noteKey].forEach(function(k){if(k&&!dispH.includes(k))dispH.push(k);});
  h.forEach(function(hh){if(dispH.length<7&&!dispH.includes(hh))dispH.push(hh);});
  rows.forEach(function(row){
    var name=(nameKey?row[nameKey]:"")||"";
    var status=((statusKey?row[statusKey]:"")||"").toLowerCase();
    var rowClass="";
    if(FAIL.some(function(w){return status.includes(w);})){fail++;rowClass="rc";callouts.push({level:"critical",title:name||"Property",detail:"Status: "+(row[statusKey]||"Failed")});}
    else if(PASS.some(function(w){return status.includes(w);})){pass++;rowClass="ro";}
    else{pending++;}
    tableRows.push({rowClass:rowClass,cols:dispH.map(function(hh){return row[hh]||"";})});
  });
  return {mode:"standard",
    summary:rows.length===0?"No data.":rows.length+" properties — "+pass+" passed, "+fail+" failed, "+pending+" pending.",
    stats:[{label:"Total",value:rows.length,color:"#84cc16"},{label:"✅ Pass",value:pass,color:"#16a34a"},{label:"🔴 Fail",value:fail,color:"#dc2626"},{label:"⏳ Pending",value:pending,color:"#64748b"}],
    callouts:callouts,tableHeaders:dispH,tableRows:tableRows};
}

function analyzeComplaints(sn,d){
  var h=d.headers,rows=d.rows;
  var dateKey=fcol(h,"date")||fcol(h,"reported")||fcol(h,"time")||h[0];
  var addrKey=fcol(h,"address")||fcol(h,"property")||fcol(h,"location");
  var typeKey=fcol(h,"type")||fcol(h,"complaint")||fcol(h,"incident")||fcol(h,"category");
  var descKey=fcol(h,"description")||fcol(h,"detail")||fcol(h,"note")||fcol(h,"comment");
  var statusKey=fcol(h,"status")||fcol(h,"resolved")||fcol(h,"action");
  var reporterKey=fcol(h,"reporter")||fcol(h,"reported by")||fcol(h,"guest")||fcol(h,"neighbor");
  var todayItems=[],recentItems=[],olderItems=[];
  rows.forEach(function(row){
    var dateStr=(dateKey?row[dateKey]:"")||"";
    var addr=(addrKey?row[addrKey]:"")||"";
    var type=(typeKey?row[typeKey]:"")||"";
    var desc=(descKey?row[descKey]:"")||"";
    var status=(statusKey?row[statusKey]:"")||"";
    var reporter=(reporterKey?row[reporterKey]:"")||"";
    var d2=pdate(dateStr);
    var item={dateStr:dateStr,addr:addr,type:type,desc:desc,status:status,reporter:reporter,d:d2};
    if(d2&&isToday(d2))todayItems.push(item);
    else if(d2&&ddiff(d2)>=-7)recentItems.push(item);
    else olderItems.push(item);
  });
  var sd=function(a,b){return(b.d||0)-(a.d||0);};
  todayItems.sort(sd);recentItems.sort(sd);olderItems.sort(sd);
  return {mode:"complaints",todayItems:todayItems,recentItems:recentItems,olderItems:olderItems,total:rows.length,
    summary:rows.length===0?"No complaints found.":rows.length+" total — "+todayItems.length+" today, "+recentItems.length+" past 7 days.",
    stats:[{label:"Total",value:rows.length,color:"#6366f1"},{label:"📅 Today",value:todayItems.length,color:"#dc2626"},{label:"📆 Last 7 Days",value:recentItems.length,color:"#d97706"},{label:"📁 Older",value:olderItems.length,color:"#64748b"}]};
}

function analyzeSecurity(sn,d){
  var h=d.headers,rows=d.rows;
  var propKey=fcol(h,"property")||fcol(h,"address")||fcol(h,"name")||h[0];
  var actionKey=fcol(h,"action")||fcol(h,"response")||fcol(h,"note")||fcol(h,"comment");
  var hospiKey=fcol(h,"hospi")||fcol(h,"link")||fcol(h,"url")||fcol(h,"hospitable");
  var dateKey=fcol(h,"date")||fcol(h,"time")||fcol(h,"timestamp");
  var propMap={};
  rows.forEach(function(row){
    var prop=(propKey?row[propKey]:"")||"Unknown";
    var action=(actionKey?row[actionKey]:"")||"";
    var hospi=(hospiKey?row[hospiKey]:"")||"";
    var date=(dateKey?row[dateKey]:"")||"";
    if(!propMap[prop])propMap[prop]={count:0,actions:[],hospiLink:"",dates:[]};
    propMap[prop].count++;
    if(action&&!propMap[prop].actions.includes(action))propMap[prop].actions.push(action);
    if(hospi)propMap[prop].hospiLink=hospi;
    if(date)propMap[prop].dates.push(date);
  });
  var props=Object.entries(propMap).map(function(e){return Object.assign({name:e[0]},e[1]);}).sort(function(a,b){return b.count-a.count;});
  var high=props.filter(function(p){return p.count>=3;}).length;
  return {mode:"security",properties:props,
    summary:rows.length===0?"No noise alert data.":rows.length+" total alerts across "+props.length+" properties. "+high+" with 3+ alerts.",
    stats:[{label:"Total Alerts",value:rows.length,color:"#7c3aed"},{label:"Properties",value:props.length,color:"#6366f1"},{label:"⚠️ High Alert (3+)",value:high,color:"#dc2626"}]};
}

function runAnalysis(id,sn,data){
  if(id==="permitting")return analyzePermitting(sn,data);
  if(id==="utilities") return analyzeUtilities(sn,data);
  if(id==="onboarding")return analyzeOnboarding(sn,data);
  if(id==="vegetation")return analyzeVegetation(sn,data);
  if(id==="complaints")return analyzeComplaints(sn,data);
  if(id==="security")  return analyzeSecurity(sn,data);
}

function renderTable(headers,rows,wrapLastN){
  if(!rows.length)return '<div style="color:#64748b;font-size:13px;font-style:italic">No data found.</div>';
  var wl=wrapLastN||2;
  return '<div class="twrap"><table><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join("")+'</tr></thead><tbody>'
    +rows.map(function(r){return '<tr class="'+r.rowClass+'">'+r.cols.map(function(c,i){return '<td class="'+(i>=headers.length-wl?"wr":"")+'" title="'+c+'">'+c+'</td>';}).join("")+'</tr>';}).join("")
    +'</tbody></table></div>';
}

  if(!ref||!ref.items||!ref.items.length)return "";

    +'<div class="twrap"><table class="ref-table"><thead><tr>'
    +'<th>'+ref.colA+'</th><th style="text-align:center">'+ref.colB+'</th><th>'+ref.colC+'</th>'
    +'</tr></thead><tbody>'
    +ref.items.map(function(item){
      return '<tr><td style="font-weight:500;color:#1e293b">'+item.a+'</td>'

function renderComplaints(result){
  var html="";
  if(result.todayItems.length>0){
    html+='<div class="today-banner"><span style="font-size:24px">🚨</span><div><div style="font-weight:800;font-size:15px">'+result.todayItems.length+' Complaint'+(result.todayItems.length>1?"s":"")+" / Incident"+(result.todayItems.length>1?"s":"")+" Today</div><div style=\"font-size:12px;opacity:.85\">"+TODAYSTR+"</div></div></div>";
    html+=result.todayItems.map(function(i){return renderComplaintCard(i,true);}).join("");
    html+='<div style="height:16px"></div>';
  }else{
    html+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-size:14px;color:#166534">✅ No complaints or incidents today.</div>';
  }
  if(result.recentItems.length>0){html+='<div class="slabel">Last 7 Days ('+result.recentItems.length+')</div>';html+=result.recentItems.map(function(i){return renderComplaintCard(i,false);}).join("");html+='<div style="height:16px"></div>';}

  return html;
}

function renderSecurity(result){
  if(!result.properties||!result.properties.length)return '<div style="color:#64748b;font-size:13px;font-style:italic">No noise alert records found.</div>';
  return result.properties.map(function(p){
    var level=p.count>=5?"critical":p.count>=3?"warning":"ok";
    var bc=level==="critical"?"#dc2626":level==="warning"?"#d97706":"#16a34a";
    var bg=level==="critical"?"#fff5f5":level==="warning"?"#fffbeb":"#f0fdf4";
    var badgeBg=level==="critical"?"#fee2e2":level==="warning"?"#fef9c3":"#dcfce7";
    var lastDate=p.dates.length?p.dates[p.dates.length-1]:"";
    return '<div class="sec-card" style="background:'+bg+';border:1px solid '+bc+'30;border-left-color:'+bc+'">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">'
      +'<div style="font-weight:700;color:#1e293b;font-size:14px">🏠 '+p.name+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="background:'+badgeBg+';color:'+bc+';padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700">🔔 '+p.count+' Alert'+(p.count!==1?"s":"")+'</span>'
      +(p.hospiLink?'<a href="'+p.hospiLink+'" target="_blank" style="background:#7c3aed;color:#fff;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;text-decoration:none">🔗 Hospitable</a>':"")
      +'</div></div>'
      +(lastDate?'<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">Last alert: '+lastDate+'</div>':"")
      +(p.actions.length?'<div style="font-size:12px;color:#475569"><strong>Actions:</strong> '+p.actions.slice(0,3).join(" · ")+'</div>':"")
      +'</div>';
  }).join("");
}

function renderResults(id,allResults,extra){
  var cfg=CFG[id];
  var tab=TABS.find(function(t){return t.id===id;});
  var html='<div class="trk-hdr"><div><h2>'+tab.label+'</h2><div class="sub">'+cfg.desc+'</div></div><button class="rbtn" onclick="loadTab(\''+id+'\',true)">↺ Refresh</button></div>';

  if(id==="onboarding"&&extra&&extra.ref){
    html+=renderRefCard(extra.ref);
    html+='<div class="slabel">Property Onboarding Status</div>';
  }

  allResults.forEach(function(ar){
    var result=ar.result;
    html+='<div class="tsec">';
    if(allResults.length>1) html+='<div class="tdiv" style="color:'+cfg.color+';border-left-color:'+cfg.color+'">'+ar.sheetName+'</div>';
    html+='<div class="sumbox" style="background:'+cfg.color+'12;border:1px solid '+cfg.color+'30">📝 '+result.summary+'</div>';

    if(result.mode==="utilities"){
      // Replicate the header stat boxes exactly like the sheet
      html+=renderUtilityStats(result.stats);
      html+='<div class="slabel">Property Details</div>'+renderTable(result.tableHeaders,result.tableRows,2);
    } else if(result.mode==="permitting"){
      if(result.stats&&result.stats.length){html+='<div class="srow">'+result.stats.map(function(s){return '<div class="scard" style="border:2px solid '+s.color+'30"><div class="sval" style="color:'+s.color+'">'+s.value+'</div><div class="slbl">'+s.label+'</div></div>';}).join("")+'</div>';}
      html+='<div class="split"><div><div class="slabel">Action Callouts</div>'+renderPermCallouts(result.callouts)+'</div><div><div class="slabel">All Permits</div>'+renderTable(result.tableHeaders,result.tableRows,2)+'</div></div>';
    } else if(result.mode==="complaints"){
      if(result.stats&&result.stats.length){html+='<div class="srow">'+result.stats.map(function(s){return '<div class="scard" style="border:2px solid '+s.color+'30"><div class="sval" style="color:'+s.color+'">'+s.value+'</div><div class="slbl">'+s.label+'</div></div>';}).join("")+'</div>';}
      html+=renderComplaints(result);
    } else if(result.mode==="security"){
      if(result.stats&&result.stats.length){html+='<div class="srow">'+result.stats.map(function(s){return '<div class="scard" style="border:2px solid '+s.color+'30"><div class="sval" style="color:'+s.color+'">'+s.value+'</div><div class="slbl">'+s.label+'</div></div>';}).join("")+'</div>';}
      html+='<div class="slabel">Properties by Alert Count (highest first)</div>'+renderSecurity(result);
    } else {
      if(result.stats&&result.stats.length){html+='<div class="srow">'+result.stats.map(function(s){return '<div class="scard" style="border:2px solid '+s.color+'30"><div class="sval" style="color:'+s.color+'">'+s.value+'</div><div class="slbl">'+s.label+'</div></div>';}).join("")+'</div>';}
      if(result.callouts&&result.callouts.length){html+='<div class="slabel">Action Callouts</div>';result.callouts.slice(0,20).forEach(function(c){html+='<div class="cbox"><div class="ctop">'+badge(c.level)+'<span class="ctitle">'+c.title+'</span></div><div class="cdet">'+c.detail+'</div></div>';});}
      else{html+='<div style="color:#16a34a;font-size:13px;margin-bottom:16px">✅ No flagged items.</div>';}
      if(result.tableRows&&result.tableRows.length){html+='<div class="slabel" style="margin-top:20px">Full Data</div>'+renderTable(result.tableHeaders,result.tableRows,2);}
    }
    html+='</div>';
  });
  return html;
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
var cache={},activeTab="home";

async function loadTab(id,force){
  var el=document.getElementById("content");
  if(id==="home"){el.innerHTML=renderHome();return;}
  if(cache[id]&&!force){el.innerHTML=renderResults(id,cache[id].results,cache[id].extra);return;}
  var cfg=CFG[id];
  el.innerHTML='<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading data…</div><div style="font-size:13px;color:#94a3b8;margin-top:6px">Fetching from Google Sheets</div></div>';
  try{
    var sheets=cfg.sheets.slice();
    var extra={};
    if(id==="onboarding"){
      try{var rd=await fetchSheet(cfg.sheetId,cfg.refSheet);extra.ref=parseRefTimeline(rd.rawRows);}catch(e){extra.ref=null;}
      var names=await fetchMeta(cfg.sheetId);
      names=names.filter(function(n){return n!==cfg.refSheet;});
      sheets=names.map(function(n){return{name:n,range:n};});
    }
    var allResults=[];
    for(var i=0;i<sheets.length;i++){
      var sheet=sheets[i];
      el.innerHTML='<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading "'+sheet.name+'"…</div><div style="font-size:13px;color:#94a3b8;margin-top:6px">Fetching from Google Sheets</div></div>';
      var data=await fetchSheet(cfg.sheetId,sheet.range);
      var result=runAnalysis(id,sheet.name,data);
      allResults.push({sheetName:sheet.name,result:result});
    }
    cache[id]={results:allResults,extra:extra};
    el.innerHTML=renderResults(id,allResults,extra);
    document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString();
  }catch(e){
    el.innerHTML='<div class="stbox"><div style="font-size:36px;margin-bottom:12px">⚠️</div>'
      +'<div style="font-weight:700;color:#dc2626;font-size:15px;margin-bottom:6px">Could not load data</div>'
      +'<div style="font-size:13px;color:#64748b;margin:0 auto 16px;max-width:500px">'+e.message+'</div>'
      +'<button class="rbtn" style="color:'+cfg.color+';border-color:'+cfg.color+'" onclick="loadTab(\''+id+'\',true)">↺ Try Again</button></div>';
  }
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(function(t){
    var a=t.id===activeTab;
    return '<button style="'+(a?"color:"+t.color+";border-bottom-color:"+t.color+";font-weight:700":"")+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';
  }).join("");
}
function switchTab(id){activeTab=id;renderTabs();loadTab(id);}
setInterval(function(){Object.keys(cache).forEach(function(id){delete cache[id];});if(activeTab!=="home")loadTab(activeTab,true);},REFRESH);
renderTabs();
loadTab("home");
</script>
