<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Techvestor Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0a1628;--navy2:#112240;--blue:#1a73e8;
  --accent:#00c9a7;--bg:#f0f4f8;--card:#fff;
  --border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --critical:#dc2626;--warning:#d97706;--ok:#16a34a;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.hdr{background:var(--navy);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;height:58px;border-bottom:1px solid rgba(255,255,255,.07)}
.hdr img{height:26px;object-fit:contain}
.hdr-div{width:1px;height:22px;background:rgba(255,255,255,.15)}
.hdr-title{color:#fff;font-weight:700;font-size:14px}
.hdr-sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.upd{color:rgba(255,255,255,.35);font-size:11px}
.abadge{background:rgba(0,201,167,.15);color:var(--accent);border:1px solid rgba(0,201,167,.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;position:sticky;top:58px;z-index:99}
.tabs button{border:none;background:none;padding:13px 15px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Inter',system-ui,sans-serif}
.tabs button:hover{color:var(--text)}
.wrap{padding:22px 18px;max-width:980px;margin:0 auto}
.hero{text-align:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-radius:16px;padding:40px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,201,167,.15),transparent 70%)}
.hero img{height:30px;margin-bottom:14px;filter:brightness(0) invert(1)}
.hero h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}
.hero p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;max-width:480px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}
.card p,.card ol{color:#475569;font-size:14px;line-height:1.75}
.card ol{padding-left:18px;line-height:2.1}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;gap:10px}
.trk-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.trk-hdr h2{font-size:18px;font-weight:700;color:var(--text)}
.trk-hdr .sub{color:var(--muted);font-size:13px;margin-top:2px}
.rbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',system-ui,sans-serif}
.tdiv{font-weight:700;font-size:14px;margin-bottom:12px;padding-left:10px;border-left:3px solid}
.tsec{margin-bottom:28px}
.sumbox{border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:14px;color:#334155;line-height:1.65}
.srow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.scard{background:#fff;border-radius:12px;padding:14px 18px;min-width:110px;text-align:center;flex:1 1 110px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sval{font-size:26px;font-weight:800;line-height:1}
.slbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
.slabel{font-weight:700;font-size:11px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px}
.cbox{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:8px}
.ctop{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ctitle{font-weight:600;color:var(--text);font-size:14px}
.cdet{color:var(--muted);font-size:13px}
.badge{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px}
.split{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.twrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--muted);font-weight:600;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
td{padding:9px 12px;border-bottom:1px solid #f8fafc;color:#334155;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.wr{white-space:normal;font-size:12px;color:#475569;max-width:300px;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.rc td:first-child{border-left:3px solid var(--critical)}
.rw td:first-child{border-left:3px solid var(--warning)}
.ro td:first-child{border-left:3px solid var(--ok)}
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}
[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;z-index:999;pointer-events:none}
.pc{border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin-right:4px;margin-top:4px;font-weight:500}
.nbox{margin-top:8px;font-size:12px;color:#475569;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px;white-space:normal;line-height:1.5}
.util-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:18px;border:2px solid var(--border);border-radius:12px;overflow:hidden}
.util-stat{padding:14px 16px;text-align:center;border-right:1px solid var(--border);background:#fff}
.util-stat:last-child{border-right:none}
.util-stat .ul{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.util-stat .uv{font-size:32px;font-weight:800;color:var(--text)}
.ref-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ref-card-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:12px}
.today-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.cc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cc.today{border:2px solid var(--navy);background:#f8faff}
.cc .cd{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.cc .ca{font-weight:700;color:var(--text);font-size:14px;margin-bottom:4px}
.cc .ct{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:6px}
.cc .cx{font-size:13px;color:#475569;line-height:1.5}
.cc .cs{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sec-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stbox{text-align:center;padding:80px 20px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.split{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr}.util-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hdr">
  <img src="https://cdn.prod.website-files.com/67a629b102d54dc82c9044c0/67a62bfeeec34081b307ec39_techvestor-logo-2.png" alt="Techvestor"/>
  <div class="hdr-div"></div>
  <div>
    <div class="hdr-title">Operations Dashboard</div>
    <div class="hdr-sub" id="hdate"></div>
  </div>
  <div class="hdr-right">
    <span class="upd" id="upd"></span>
    <span class="abadge">⟳ Auto-refresh 15m</span>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="content"></div>

<script>
var KEY = "AIzaSyC8Pa8tBIl17GMtA68ltcx-AGlrUvmtcn8";
var REFRESH = 15 * 60 * 1000;
var TODAY = new Date();
var TODAYSTR = TODAY.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
var TODAYDATE = TODAY.toDateString();
document.getElementById("hdate").textContent = "Live · " + TODAYSTR;

var TABS = [
  {id:"home",       label:"🏠 Home",                  color:"#6366f1"},
  {id:"permitting", label:"📋 Permitting",             color:"#f59e0b"},
  {id:"utilities",  label:"⚡ Utilities ERM",          color:"#3b82f6"},
  {id:"onboarding", label:"🏠 Property Onboarding",    color:"#10b981"},
  {id:"vegetation", label:"🌿 Vegetation Audit",       color:"#84cc16"},
  {id:"complaints", label:"📣 Complaints & Incidents", color:"#6366f1"},
  {id:"security",   label:"🔒 Security Monitoring",    color:"#7c3aed"},
];

var CFG = {
  permitting:{sheetId:"1Ex7gyGxpTvbDBQMD2PNfivYbea0YmOEDKO5innwPBZg",color:"#f59e0b",desc:"Expiration tab — permits expiring soon with notes",mode:"permitting",sheets:[{name:"Expiration",range:"Expiration"}]},
  utilities: {sheetId:"1bPlzWPzarOI03QO1_LqUrhlrxM8AMc2MPrQHiYrPCns",color:"#3b82f6",desc:"SUMMARY tab — live utility status overview",mode:"utilities",sheets:[{name:"SUMMARY",range:"SUMMARY"}]},
  onboarding:{sheetId:"13JffxAKNLUaPm2n1iBWNCL48k-7CCEaf4xwu0xgjZN4",color:"#10b981",desc:"Ref Timeline + all property onboarding tabs",mode:"onboarding",sheets:[],refSheet:"Ref Timeline"},
  vegetation: {sheetId:"1omzFAmQLUUk-g9tOd9b3fm9NbnxhXVbnGUQXUb6-6mg",color:"#84cc16",desc:"Lawncare Audit AZ & FL — notes, date captured, timestamp",mode:"vegetation",sheets:[{name:"Lawncare Audit AZ",range:"Lawncare Audit AZ"},{name:"Lawncare Audit FL",range:"Lawncare Audit FL"}]},
  // Complaints: slash in tab name — we use gid=0 fallback via metadata
  complaints:{sheetId:"1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs",color:"#6366f1",desc:"Neighbor Complaint / Incident Reported by Guest Log",mode:"complaints",sheets:[{name:"Neighbor Complaint/Incident Reported by Guest Log",range:"Neighbor Complaint%2FIncident Reported by Guest Log"}]},
  security:  {sheetId:"1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs",color:"#7c3aed",desc:"Noise Alert Logs — property alerts, actions & Hospitable links",mode:"security",sheets:[{name:"Noise Alert Logs",range:"Noise Alert Logs"}]},
};

// ── FETCH ────────────────────────────────────────────────────────────────────
async function fetchSheet(sheetId, range) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "/values/" + encodeURIComponent(range) + "?key=" + KEY;
  var r = await fetch(url);
  if (!r.ok) {
    var b = await r.json().catch(function(){return{};});
    var m = (b.error&&b.error.message)||("HTTP "+r.status);
    if (r.status===403) throw new Error("API key unauthorized: "+m);
    if (r.status===400) throw new Error('Tab "'+range+'" not found: '+m);
    if (r.status===404) throw new Error("Spreadsheet not found or not public.");
    throw new Error(m);
  }
  var data = await r.json();
  var rows = data.values || [];
  if (!rows.length) return {headers:[],rows:[],rawRows:[]};
  var headers = rows[0].map(function(h){return(h||"").trim();});
  var dataRows = rows.length>1 ? rows.slice(1).map(function(row){
    var obj={};
    headers.forEach(function(h,i){obj[h]=(row[i]||"").trim();});
    return obj;
  }) : [];
  return {headers:headers,rows:dataRows,rawRows:rows};
}

// Fetch by sheet GID number (avoids slash encoding issues)
async function fetchSheetByGid(sheetId, gid) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "?key=" + KEY + "&includeGridData=false";
  var r = await fetch(url);
  if (!r.ok) throw new Error("Could not load spreadsheet.");
  var meta = await r.json();
  var sheet = (meta.sheets||[]).find(function(s){return s.properties&&s.properties.sheetId===gid;});
  if (!sheet) throw new Error("Sheet with GID "+gid+" not found.");
  return fetchSheet(sheetId, sheet.properties.title);
}

async function fetchMeta(sheetId) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "?key=" + KEY;
  var r = await fetch(url);
  if (!r.ok) throw new Error("Could not load spreadsheet metadata.");
  var data = await r.json();
  return (data.sheets||[])
    .filter(function(s){return s.properties&&!s.properties.hidden;})
    .map(function(s){return {title:s.properties.title, gid:s.properties.sheetId};})
    .filter(function(s){return s.title;});
}

// Fetch complaints using spreadsheet metadata to get exact gid then fetch by title
async function fetchComplaintsSheet(sheetId) {
  var sheets = await fetchMeta(sheetId);
  var target = sheets.find(function(s){
    var t = s.title.toLowerCase();
    return t.includes("neighbor") || t.includes("complaint") || t.includes("guest");
  });
  if (!target) throw new Error("Complaints tab not found. Available: "+sheets.map(function(s){return s.title;}).join(", "));
  return fetchSheet(sheetId, target.title);
}

async function fetchSecuritySheet(sheetId) {
  var sheets = await fetchMeta(sheetId);
  var target = sheets.find(function(s){
    var t = s.title.toLowerCase();
    return t.includes("noise") || t.includes("alert");
  });
  if (!target) throw new Error("Noise Alert tab not found. Available: "+sheets.map(function(s){return s.title;}).join(", "));
  // Security sheet has headers in row 3 — fetch raw and use row 3 as headers
  var d = await fetchSheet(sheetId, target.title);
  return d;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function colIdx(letter) {
  // Convert column letter to 0-based index: A=0, B=1, etc.
  letter = letter.toUpperCase();
  var n = 0;
  for (var i=0; i<letter.length; i++) n = n*26 + (letter.charCodeAt(i)-64);
  return n-1;
}

function getByCol(row, letter) {
  // row is an object keyed by header names — we also store _raw array for col-by-letter access
  if (row._raw) return (row._raw[colIdx(letter)]||"").trim();
  return "";
}

function fcol(headers,kw){
  if(!kw)return null;
  return headers.find(function(h){return h.toLowerCase().includes(kw.toLowerCase());})||null;
}
function pdate(str){if(!str)return null;var d=new Date(str);return isNaN(d.getTime())?null:d;}
function ddiff(d){return Math.round((d.getTime()-TODAY.getTime())/86400000);}
function isToday(d){return d&&d.toDateString()===TODAYDATE;}
function badge(level){
  var m={critical:{bg:"#fee2e2",c:"#dc2626",i:"🔴"},warning:{bg:"#fef9c3",c:"#d97706",i:"🟡"},info:{bg:"#eff6ff",c:"#2563eb",i:"🔵"}};
  var s=m[level]||m.info;
  return '<span class="badge" style="background:'+s.bg+';color:'+s.c+'">'+s.i+' '+level.toUpperCase()+'</span>';
}
function esc(s){return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── ANALYSIS ─────────────────────────────────────────────────────────────────

function analyzePermitting(sn, d) {
  var rawRows = d.rawRows || [];
  // Row 1 = headers (index 0), data starts index 1
  // Columns by letter: A=property, expiration somewhere, I=Notes, last updated col
  // We'll use rawRows for precise column access
  if (rawRows.length < 2) return {mode:"permitting",summary:"No data.",stats:[],callouts:[],tableHeaders:["Property Name","Expiration Date","Notes","Last Updated"],tableRows:[]};

  var headers = rawRows[0].map(function(h){return(h||"").trim();});
  // Find expiration date col — look for "expir" in headers
  var expColIdx = -1;
  var nameColIdx = 0; // Column A
  var notesColIdx = 8; // Column I (0-based = 8)
  var updColIdx = -1;

  headers.forEach(function(h,i){
    var hl = h.toLowerCase();
    if(expColIdx===-1 && (hl.includes("expir")||hl.includes("expiration"))) expColIdx=i;
    if(updColIdx===-1 && (hl.includes("updated")||hl.includes("last update")||hl.includes("modified"))) updColIdx=i;
  });
  // Fallback expiration to col B (index 1) if not found
  if(expColIdx===-1) expColIdx=1;

  var critical=0,warning=0,ok=0,callouts=[],tableRows=[];

  rawRows.slice(1).forEach(function(row){
    var name    = (row[nameColIdx]||"").trim();
    var dateStr = (row[expColIdx] ||"").trim();
    var notes   = (row[notesColIdx]||"").trim();
    var updated = updColIdx>=0?(row[updColIdx]||"").trim():"";
    if (!name && !dateStr) return;

    var d2=pdate(dateStr), diff=d2?ddiff(d2):null;
    var level="ok",label="",rowClass="ro";
    if(diff!==null){
      if(diff<0){level="critical";label="EXPIRED";critical++;rowClass="rc";}
      else if(diff<=30){level="critical";label=diff+"d left";critical++;rowClass="rc";}
      else if(diff<=90){level="warning";label=diff+"d left";warning++;rowClass="rw";}
      else{ok++;}
    }else{ok++;}

    if(level==="critical"||level==="warning"){
      callouts.push({level:level,name:name,dateStr:dateStr,label:label,notes:notes,updated:updated});
    }
    tableRows.push({rowClass:rowClass,cols:[name,dateStr,notes,updated]});
  });

  callouts.sort(function(a,b){return({critical:0,warning:1}[a.level]||0)-({critical:0,warning:1}[b.level]||0);});
  var total = tableRows.length;
  return {
    mode:"permitting",
    summary:total===0?"No data.":critical+" critical/expired, "+warning+" expiring ≤90 days, "+ok+" OK of "+total+" total.",
    stats:[{label:"Total",value:total,color:"#f59e0b"},{label:"🔴 Critical",value:critical,color:"#dc2626"},{label:"🟡 Warning",value:warning,color:"#d97706"},{label:"✅ OK",value:ok,color:"#16a34a"}],
    callouts:callouts,
    tableHeaders:["Property Name","Expiration Date","Notes","Last Updated"],
    tableRows:tableRows
  };
}

function analyzeUtilities(sn,d){
  var h=d.headers,rows=d.rows,rawRows=d.rawRows||[];
  // Find summary stat values — look for first row with big numbers
  var totalKey=fcol(h,"total live")||fcol(h,"total");
  var validKey=fcol(h,"validation issue")||fcol(h,"validation");
  var setupKey=fcol(h,"setting up")||fcol(h,"setup");
  var ageKey=fcol(h,"more than")||fcol(h,"age")||fcol(h,"two");

  var sv={total:"—",validation:"—",setup:"—",age:"—"};
  if(rows.length>0){
    var fr=rows[0];
    if(totalKey&&fr[totalKey])sv.total=fr[totalKey];
    if(validKey&&fr[validKey])sv.validation=fr[validKey];
    if(setupKey&&fr[setupKey])sv.setup=fr[setupKey];
    if(ageKey&&fr[ageKey])sv.age=fr[ageKey];
  }

  var ISSUE=["fail","missing","incomplete","overdue","n/a","tbd","pending","hold","not ","reject"];
  var DONE=["complete","done","active","approved","pass","yes","ok","set up","received","signed","validated"];
  var complete=0,pending=0,issues=0;
  var tableRows=rows.map(function(row){
    var all=Object.values(row).join(" ").toLowerCase();
    var rc="";
    if(ISSUE.some(function(w){return all.includes(w);})){issues++;rc="rw";}
    else if(DONE.some(function(w){return all.includes(w);})){complete++;rc="ro";}
    else{pending++;}
    return{rowClass:rc,cols:h.map(function(hh){return row[hh]||"";})};
  });
  return{
    mode:"utilities",sv:sv,
    summary:"SUMMARY — "+rows.length+" records. "+complete+" OK, "+pending+" pending, "+issues+" flagged.",
    tableHeaders:h,tableRows:tableRows
  };
}

function analyzeOnboarding(sn,d){
  var h=d.headers,rows=d.rows;
  var nameKey=h[0];
  var ISSUE=["fail","missing","incomplete","overdue","hold","stall","not ","pending","tbd","n/a","reject"];
  var DONE=["complete","done","approved","active","yes","ok","received","signed","passed"];
  var pending=0,complete=0,issues=0,callouts=[],tableRows=[];
  rows.forEach(function(row){
    var name=(row[nameKey]||"").trim();
    if(!name)return;
    var all=Object.values(row).join(" ").toLowerCase();
    var rc="";
    if(ISSUE.some(function(w){return all.includes(w);})){
      issues++;rc="rw";
      var fl=Object.entries(row).filter(function(e){return ISSUE.some(function(w){return e[1].toLowerCase().includes(w);});}).map(function(e){return e[0]+": "+e[1];}).join("; ");
      callouts.push({level:"warning",title:name,detail:fl||"Needs attention"});
    }else if(DONE.some(function(w){return all.includes(w);})){complete++;rc="ro";}
    else{pending++;}
    tableRows.push({rowClass:rc,cols:h.slice(0,6).map(function(hh){return row[hh]||"";})});
  });
  return{
    mode:"onboarding",
    summary:rows.length===0?"No data.":rows.length+" properties — "+complete+" complete, "+pending+" pending, "+issues+" flagged.",
    stats:[{label:"Total",value:rows.length,color:"#10b981"},{label:"✅ Complete",value:complete,color:"#16a34a"},{label:"⏳ Pending",value:pending,color:"#64748b"},{label:"⚠️ Flagged",value:issues,color:"#d97706"}],
    callouts:callouts,tableHeaders:h.slice(0,6),tableRows:tableRows
  };
}

function parseRefTimeline(rawRows){
  if(!rawRows||rawRows.length<3)return{colA:"Onboarding Checklist",colB:"SOP Timeframe (Days)",colC:"Stage",items:[]};
  var cols=rawRows[1]||[];
  var colA=(cols[0]||"Onboarding Checklist").trim();
  var colB=(cols[1]||"SOP Timeframe (Days)").trim();
  var colC=(cols[2]||"Stage").trim();
  var items=rawRows.slice(2).map(function(r){return{a:(r[0]||"").trim(),b:(r[1]||"").trim(),c:(r[2]||"").trim()};}).filter(function(r){return r.a||r.b||r.c;});
  return{colA:colA,colB:colB,colC:colC,items:items};
}

function analyzeVegetation(sn,d){
  var rawRows=d.rawRows||[];
  if(rawRows.length<2)return{mode:"standard",summary:"No data.",stats:[],callouts:[],tableHeaders:[],tableRows:[]};

  var headers=rawRows[0].map(function(h){return(h||"").trim();});

  // Find key columns by name
  var nameIdx   = 0; // default col A
  var statusIdx = -1;
  var dateCapIdx= -1;
  var tsIdx     = -1;
  var serviceIdx= -1;
  var notesIdx  = -1;

  headers.forEach(function(h,i){
    var hl=h.toLowerCase();
    if(nameIdx===0 && (hl.includes("address")||hl.includes("property"))) nameIdx=i;
    if(statusIdx===-1 && hl.includes("status")) statusIdx=i;
    if(dateCapIdx===-1 && hl.includes("date captured")) dateCapIdx=i;
    if(tsIdx===-1 && hl.includes("timestamp")) tsIdx=i;
    if(serviceIdx===-1 && (hl.includes("service")||hl.includes("need"))) serviceIdx=i;
    if(notesIdx===-1 && (hl.includes("note")||hl.includes("comment")||hl.includes("remark"))) notesIdx=i;
  });

  // Build display headers
  var dispIdxs=[];
  [nameIdx,statusIdx,dateCapIdx,tsIdx,serviceIdx,notesIdx].forEach(function(i){if(i>=0&&!dispIdxs.includes(i))dispIdxs.push(i);});
  var dispHeaders=dispIdxs.map(function(i){return headers[i]||"Col "+(i+1);});

  var FAIL=["fail","no","issue","overdue","incomplete","missing","needs","yes"];
  var PASS=["pass","ok","complete","done","approved","n/a","no"];
  var pass=0,fail=0,pending=0,callouts=[],tableRows=[];

  // Sort by most recent — try to parse date from dateCapIdx or tsIdx
  var dataRows = rawRows.slice(1).filter(function(r){return r.some(function(c){return(c||"").trim();});});
  // Sort descending by date captured if available
  if(dateCapIdx>=0){
    dataRows.sort(function(a,b){
      var da=pdate((a[dateCapIdx]||"").trim()), db=pdate((b[dateCapIdx]||"").trim());
      return (db?db.getTime():0)-(da?da.getTime():0);
    });
  }

  dataRows.forEach(function(row){
    var name   =(row[nameIdx]   ||"").trim();
    var status =((row[statusIdx]||"")).trim().toLowerCase();
    var rc="";
    if(FAIL.some(function(w){return status===w||status.includes(w);})){fail++;rc="rc";callouts.push({level:"critical",title:name||"Property",detail:"Status: "+(row[statusIdx]||"Review needed")});}
    else if(PASS.some(function(w){return status===w||status.includes(w);})){pass++;rc="ro";}
    else{pending++;}
    tableRows.push({rowClass:rc,cols:dispIdxs.map(function(i){return(row[i]||"").trim();})});
  });

  return{
    mode:"standard",
    summary:dataRows.length===0?"No data.":dataRows.length+" properties — "+pass+" pass, "+fail+" fail/flagged, "+pending+" pending. Sorted by most recent.",
    stats:[{label:"Total",value:dataRows.length,color:"#84cc16"},{label:"✅ Pass",value:pass,color:"#16a34a"},{label:"🔴 Fail",value:fail,color:"#dc2626"},{label:"⏳ Pending",value:pending,color:"#64748b"}],
    callouts:callouts,tableHeaders:dispHeaders,tableRows:tableRows
  };
}

function analyzeComplaints(sn,d){
  var h=d.headers,rows=d.rows;
  var dateKey   =fcol(h,"date")||fcol(h,"reported")||fcol(h,"time")||h[0];
  var addrKey   =fcol(h,"address")||fcol(h,"property")||fcol(h,"location");
  var typeKey   =fcol(h,"type")||fcol(h,"complaint")||fcol(h,"incident")||fcol(h,"category");
  var descKey   =fcol(h,"description")||fcol(h,"detail")||fcol(h,"note")||fcol(h,"comment");
  var statusKey =fcol(h,"status")||fcol(h,"resolved")||fcol(h,"action");
  var repKey    =fcol(h,"reporter")||fcol(h,"reported by")||fcol(h,"guest")||fcol(h,"neighbor");
  var today=[],recent=[],older=[];
  rows.forEach(function(row){
    var dateStr=(dateKey?row[dateKey]:"")||"";
    var addr   =(addrKey?row[addrKey]:"")||"";
    var type   =(typeKey?row[typeKey]:"")||"";
    var desc   =(descKey?row[descKey]:"")||"";
    var status =(statusKey?row[statusKey]:"")||"";
    var rep    =(repKey?row[repKey]:"")||"";
    var d2=pdate(dateStr);
    var item={dateStr:dateStr,addr:addr,type:type,desc:desc,status:status,reporter:rep,d:d2};
    if(d2&&isToday(d2))today.push(item);
    else if(d2&&ddiff(d2)>=-7)recent.push(item);
    else older.push(item);
  });
  var sd=function(a,b){return(b.d||0)-(a.d||0);};
  today.sort(sd);recent.sort(sd);older.sort(sd);
  return{mode:"complaints",todayItems:today,recentItems:recent,olderItems:older,total:rows.length,
    summary:rows.length===0?"No complaints found.":rows.length+" total — "+today.length+" today, "+recent.length+" past 7 days.",
    stats:[{label:"Total",value:rows.length,color:"#6366f1"},{label:"📅 Today",value:today.length,color:"#dc2626"},{label:"📆 Last 7 Days",value:recent.length,color:"#d97706"},{label:"📁 Older",value:older.length,color:"#64748b"}]
  };
}

function analyzeSecurity(sn,d){
  // Row 3 (index 2) = actual headers; Col B=property, C=guest, D=hospi link, R=Slack link 3rd alert
  var rawRows=d.rawRows||[];
  if(rawRows.length<4)return{mode:"security",properties:[],summary:"No data.",stats:[{label:"Total Alerts",value:0,color:"#7c3aed"},{label:"Properties",value:0,color:"#6366f1"},{label:"⚠️ High Alert (3+)",value:0,color:"#dc2626"}]};

  // Use row index 2 (row 3 in sheet) as headers
  var hdrs=rawRows[2].map(function(h){return(h||"").trim();});
  var dataRows=rawRows.slice(3);

  var propMap={};
  dataRows.forEach(function(row){
    var prop    =(row[1]||"").trim(); // Col B
    var guest   =(row[2]||"").trim(); // Col C
    var hospi   =(row[3]||"").trim(); // Col D
    var slack   =(row[17]||"").trim(); // Col R (0-based index 17)
    var dateStr =(row[0]||"").trim(); // Col A often date
    if(!prop)return;
    if(!propMap[prop])propMap[prop]={count:0,guests:[],hospiLink:"",slackLink:"",dates:[]};
    propMap[prop].count++;
    if(guest&&!propMap[prop].guests.includes(guest))propMap[prop].guests.push(guest);
    if(hospi)propMap[prop].hospiLink=hospi;
    if(slack)propMap[prop].slackLink=slack;
    if(dateStr)propMap[prop].dates.push(dateStr);
  });

  var props=Object.entries(propMap).map(function(e){return Object.assign({name:e[0]},e[1]);}).sort(function(a,b){return b.count-a.count;});
  var high=props.filter(function(p){return p.count>=3;}).length;
  return{
    mode:"security",properties:props,
    summary:dataRows.length===0?"No noise alert data.":dataRows.length+" total alerts across "+props.length+" properties. "+high+" with 3+ alerts.",
    stats:[{label:"Total Alerts",value:dataRows.length,color:"#7c3aed"},{label:"Properties",value:props.length,color:"#6366f1"},{label:"⚠️ High Alert (3+)",value:high,color:"#dc2626"}]
  };
}

function runAnalysis(id,sn,data){
  if(id==="permitting") return analyzePermitting(sn,data);
  if(id==="utilities")  return analyzeUtilities(sn,data);
  if(id==="onboarding") return analyzeOnboarding(sn,data);
  if(id==="vegetation") return analyzeVegetation(sn,data);
  if(id==="complaints") return analyzeComplaints(sn,data);
  if(id==="security")   return analyzeSecurity(sn,data);
}

      var cd=await fetchComplaintsSheet(cfg.sheetId);
      var cr=runAnalysis(id,"Complaints",cd);
      cache[id]={results:[{sheetName:"Complaints",result:cr}],extra:{}};
      el.innerHTML=renderResults(id,[{sheetName:"Complaints",result:cr}],{});
      document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString();
      return;
    }

    if(id==="security"){
      var sd=await fetchSecuritySheet(cfg.sheetId);
      var sr=runAnalysis(id,"Noise Alert Logs",sd);
      cache[id]={results:[{sheetName:"Noise Alert Logs",result:sr}],extra:{}};
      el.innerHTML=renderResults(id,[{sheetName:"Noise Alert Logs",result:sr}],{});
      document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString();
      return;
    }

    var allResults=[];
    for(var i=0;i<sheets.length;i++){
      var sheet=sheets[i];
      el.innerHTML='<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading "'+sheet.name+'"…</div><div style="font-size:13px;color:#94a3b8;margin-top:6px">Fetching from Google Sheets</div></div>';
      var data=await fetchSheet(cfg.sheetId,sheet.range);
      var result=runAnalysis(id,sheet.name,data);
      allResults.push({sheetName:sheet.name,result:result});
    }
    cache[id]={results:allResults,extra:extra};
    el.innerHTML=renderResults(id,allResults,extra);
    document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString();
  }catch(e){
    el.innerHTML='<div class="stbox"><div style="font-size:36px;margin-bottom:12px">⚠️</div>'
      +'<div style="font-weight:700;color:#dc2626;font-size:15px;margin-bottom:6px">Could not load data</div>'
      +'<div style="font-size:13px;color:#64748b;margin:0 auto 16px;max-width:500px">'+esc(e.message)+'</div>'
      +'<button class="rbtn" style="color:'+cfg.color+';border-color:'+cfg.color+'" onclick="loadTab(\''+id+'\',true)">↺ Try Again</button></div>';
  }
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(function(t){
    var a=t.id===activeTab;
    return '<button style="'+(a?"color:"+t.color+";border-bottom-color:"+t.color+";font-weight:700":"")+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';
  }).join("");
}
function switchTab(id){activeTab=id;renderTabs();loadTab(id);}
setInterval(function(){Object.keys(cache).forEach(function(id){delete cache[id];});if(activeTab!=="home")loadTab(activeTab,true);},REFRESH);
renderTabs();
loadTab("home");
</script>
</body>
</html>
