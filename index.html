<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Operations Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
.header{background:#1e293b;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-title{color:#fff;font-weight:800;font-size:15px}
.header-sub{color:#94a3b8;font-size:11px;margin-top:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.last-updated{color:#64748b;font-size:11px}
.auto-badge{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tabbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 14px;display:flex;overflow-x:auto;position:sticky;top:53px;z-index:99}
.tabbar button{border:none;background:none;padding:13px 16px;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s}
.tabbar button.active{font-weight:700;border-bottom-color:var(--c);color:var(--c)}
.content{padding:22px 18px;max-width:920px;margin:0 auto}
/* Home */
.home-hero{text-align:center;margin-bottom:28px}
.home-hero h1{font-size:26px;font-weight:800;color:#1e293b;margin:10px 0 8px}
.home-hero p{color:#64748b;font-size:14px;line-height:1.7;max-width:500px;margin:0 auto}
.card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:22px;margin-bottom:20px}
.card h2{font-size:16px;color:#1e293b;margin-bottom:10px}
.card p,.card ol{color:#475569;font-size:14px;line-height:1.75}
.card ol{padding-left:18px;line-height:2.1}
.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tracker-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 14px;display:flex;gap:10px}
/* Tracker */
.tracker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.tracker-header h2{font-size:19px;color:#1e293b}
.tracker-header .sub{color:#64748b;font-size:13px;margin-top:2px}
.refresh-btn{padding:6px 16px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;font-size:13px}
.refresh-btn:hover{background:#f8fafc}
.tab-divider{font-weight:700;font-size:15px;margin-bottom:12px;border-left:3px solid;padding-left:10px}
.tab-section{margin-bottom:32px}
.summary-box{border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:14px;color:#334155;line-height:1.65}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:12px 18px;min-width:110px;text-align:center;flex:1 1 110px}
.stat-val{font-size:24px;font-weight:800}
.stat-lbl{font-size:11px;color:#64748b;margin-top:2px}
.callouts-label{font-weight:700;font-size:12px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.callout{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 15px;margin-bottom:8px}
.callout-top{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.callout-title{font-weight:600;color:#1e293b;font-size:14px}
.callout-detail{color:#64748b;font-size:13px}
.badge{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px}
/* Table */
.table-wrap{overflow-x:auto;margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:8px 12px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#334155;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#f8fafc}
.row-critical td:first-child{border-left:3px solid #dc2626}
.row-warning td:first-child{border-left:3px solid #f59e0b}
.row-ok td:first-child{border-left:3px solid #22c55e}
/* State */
.state-box{text-align:center;padding:70px 20px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{font-size:13px;color:#64748b;margin:8px auto 16px;max-width:500px}
.retry-btn{padding:8px 22px;border-radius:8px;border:1px solid;background:#fff;cursor:pointer;font-weight:600}
/* Responsive */
@media(max-width:700px){.perm-split{grid-template-columns:1fr!important}}

</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">📊</span>
  <div>
    <div class="header-title">Operations Dashboard</div>
    <div class="header-sub" id="hdate"></div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated"></span>

  </div>
</div>

<div class="tabbar" id="tabbar"></div>
<div class="content" id="content"></div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const API_KEY       = "AIzaSyC8Pa8tBIl17GMtA68ltcx-AGlrUvmtcn8";
const REFRESH_MS    = 15 * 60 * 1000; // 15 minutes
const TODAY         = new Date();
const TODAY_STR     = TODAY.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

document.getElementById("hdate").textContent = "Live · " + TODAY_STR;

const TABS = [
  {id:"home",       label:"🏠 Home",               color:"#6366f1"},
  {id:"permitting", label:"📋 Permitting",          color:"#f59e0b"},
  {id:"utilities",  label:"⚡ Utilities ERM",       color:"#3b82f6"},
  {id:"onboarding", label:"🏠 Property Onboarding", color:"#10b981"},
  {id:"vegetation", label:"🌿 Vegetation Audit",    color:"#84cc16"},
];

const CONFIGS = {
  permitting:{
    sheetId:"1Ex7gyGxpTvbDBQMD2PNfivYbea0YmOEDKO5innwPBZg",
    color:"#f59e0b",
    desc:"Expiration tab — permits expiring soon with action notes",
    sheets:[{name:"Expiration",range:"Expiration"}],
    // Which columns to use (case-insensitive partial match)
    dateCol:"expir",      // column containing expiration date
    nameCol:"permit",     // column for item name/title
    statusCol:"status",
    noteCol:"note",
    analyze: analyzePermitting,
  },
  utilities:{
    sheetId:"1bPlzWPzarOI03QO1_LqUrhlrxM8AMc2MPrQHiYrPCns",
    color:"#3b82f6",
    desc:"Utility Setup Status & Utility Validation Status tabs",
    sheets:[
      {name:"Utility Setup Status",     range:"Utility Setup Status"},
      {name:"Utility Validation Status",range:"Utility Validation Status"},
    ],
    nameCol:"address",
    statusCol:"status",
    analyze: analyzeStatus,
  },
  onboarding:{
    sheetId:"13JffxAKNLUaPm2n1iBWNCL48k-7CCEaf4xwu0xgjZN4",
    color:"#10b981",
    desc:"Full property onboarding pipeline — all tabs",
    sheets:[{name:"Onboarding",range:"Sheet1"}],
    nameCol:"address",
    statusCol:"status",
    analyze: analyzeOnboarding,
  },
  vegetation:{
    sheetId:"1omzFAmQLUUk-g9tOd9b3fm9NbnxhXVbnGUQXUb6-6mg",
    color:"#84cc16",
    desc:"Lawncare Audit AZ & FL tabs",
    sheets:[
      {name:"Lawncare Audit AZ",range:"Lawncare Audit AZ"},
      {name:"Lawncare Audit FL",range:"Lawncare Audit FL"},
    ],
    nameCol:"address",
    statusCol:"status",
    analyze: analyzeVegetation,
  },
};

// ─────────────────────────────────────────────
//  FETCH SHEET
// ─────────────────────────────────────────────
async function fetchSheet(sheetId, range){
  const url = "https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"/values/"+encodeURIComponent(range)+"?key="+API_KEY;
  const r = await fetch(url);
  if(!r.ok){
    const b = await r.json().catch(()=>({}));
    const m = (b.error&&b.error.message)||"HTTP "+r.status;
    if(r.status===403) throw new Error("API key unauthorized. Ensure sheet is public and Sheets API is enabled. ("+m+")");
    if(r.status===400) throw new Error('Tab "'+range+'" not found. Check exact tab name in spreadsheet.');
    if(r.status===404) throw new Error("Spreadsheet not found. Ensure it is shared publicly.");
    throw new Error(m);
  }
  const data = await r.json();
  const rows = data.values||[];
  if(rows.length<2) return {headers:[],rows:[]};
  const headers = rows[0].map(h=>(h||"").trim());
  const dataRows = rows.slice(1).map(row=>{
    const obj={};
    headers.forEach((h,i)=>{obj[h]=row[i]||"";});
    return obj;
  });
  return {headers,rows:dataRows};
}

// ─────────────────────────────────────────────
//  ANALYSIS FUNCTIONS
// ─────────────────────────────────────────────
function findCol(headers, keyword){
  if(!keyword) return null;
  return headers.find(h=>h.toLowerCase().includes(keyword.toLowerCase()))||null;
}

function parseDate(str){
  if(!str) return null;
  const d = new Date(str);
  return isNaN(d)?null:d;
}

function daysDiff(d){
  return Math.round((d-TODAY)/(1000*60*60*24));
}

function analyzePermitting(tabName, {headers, rows}, cfg){
  const dateKey   = findCol(headers, cfg.dateCol||"expir");
  const nameKey   = findCol(headers, cfg.nameCol||"permit") || findCol(headers,"address") || findCol(headers,"property") || headers[0];
  const statusKey = findCol(headers, cfg.statusCol||"status");
  const noteKey   = findCol(headers, cfg.noteCol||"note") || findCol(headers,"comment") || findCol(headers,"action");

  const callouts=[],tableRows=[];
  let critical=0,warning=0,ok=0,total=rows.length;

  rows.forEach(row=>{
    const name   = nameKey   ? row[nameKey]   : Object.values(row)[0]||"";
    const status = statusKey ? row[statusKey] : "";
    const note   = noteKey   ? row[noteKey]   : "";
    const dateStr= dateKey   ? row[dateKey]   : "";
    const d      = parseDate(dateStr);
    const diff   = d ? daysDiff(d) : null;

    let level="ok", label="", rowClass="row-ok";
    if(diff!==null){
      if(diff<0){level="critical";label="EXPIRED";critical++;rowClass="row-critical";}
      else if(diff<=30){level="critical";label=diff+"d left";critical++;rowClass="row-critical";}
      else if(diff<=90){level="warning";label=diff+"d left";warning++;rowClass="row-warning";}
      else{ok++;label=diff+"d left";}
    } else { ok++; }

    if(level==="critical"||level==="warning"){
      callouts.push({level,title:name||(dateStr||"Item"),detail:(note||status||"Expires: "+dateStr),note,status,dateStr,label});
    }
    tableRows.push({rowClass,cols:[name,dateStr,label,status,note]});
  });

  callouts.sort((a,b)=>({critical:0,warning:1,info:2}[a.level]??2)-({critical:0,warning:1,info:2}[b.level]??2));
  const summary = total===0?"No data found.":critical+" expired/critical, "+warning+" expiring within 90 days, "+ok+" items OK out of "+total+" total permits.";

  return{
    summary,callouts,
    isPermitting:true,
    stats:[
      {label:"Total",value:total,color:cfg.color},
      {label:"🔴 Critical",value:critical,color:"#dc2626"},
      {label:"🟡 Warning",value:warning,color:"#b45309"},
      {label:"✅ OK",value:ok,color:"#16a34a"},
    ],
    tableHeaders:["Permit / Property","Expiration Date","Days Left","Status","Notes"],
    tableRows,
  };
}

function analyzeStatus(tabName, {headers, rows}, cfg){
  const nameKey   = findCol(headers, cfg.nameCol||"address") || headers[0];
  const statusKey = findCol(headers, cfg.statusCol||"status");

  let pending=0, complete=0, issues=0, total=rows.length;
  const callouts=[], tableRows=[];

  const ISSUE_WORDS   = ["fail","error","issue","problem","reject","missing","incomplete","overdue","n/a","tbd","pending","not"];
  const COMPLETE_WORDS= ["complete","done","active","approved","pass","yes","set up","validated","ok"];

  rows.forEach(row=>{
    const name  = nameKey   ? row[nameKey]   : Object.values(row)[0]||"";
    const status= statusKey ? (row[statusKey]||"").toLowerCase() : "";
    const allVals= Object.values(row).join(" ").toLowerCase();

    let level="info", rowClass="";
    if(ISSUE_WORDS.some(w=>status.includes(w)||allVals.includes(w))){
      level="warning";issues++;rowClass="row-warning";
      callouts.push({level:"warning",title:name||"Item",detail:"Status: "+(row[statusKey]||"Review needed")});
    } else if(COMPLETE_WORDS.some(w=>status.includes(w))){
      complete++;rowClass="row-ok";
    } else {
      pending++;rowClass="";
    }

    const displayCols = headers.slice(0,5).map(h=>row[h]||"");
    tableRows.push({rowClass, cols:displayCols});
  });

  const summary = total===0
    ? "No data found."
    : total+" records — "+complete+" complete, "+pending+" pending, "+issues+" flagged for review.";

  return {
    summary, callouts,
    stats:[
      {label:"Total",value:total,color:cfg.color},
      {label:"✅ Complete",value:complete,color:"#16a34a"},
      {label:"⏳ Pending",value:pending,color:"#64748b"},
      {label:"⚠️ Flagged",value:issues,color:"#b45309"},
    ],
    tableHeaders: headers.slice(0,5),
    tableRows,
  };
}

// Onboarding: fetches ALL tabs dynamically
async function fetchAllOnboardingTabs(sheetId){
  // First get sheet metadata to find all tab names
  const url = "https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"?key="+API_KEY;
  const r = await fetch(url);
  if(!r.ok) throw new Error("Could not load onboarding spreadsheet metadata.");
  const meta = await r.json();
  const sheets = (meta.sheets||[]).map(s=>s.properties?.title).filter(Boolean);
  return sheets;
}

function analyzeOnboarding(tabName, {headers,rows}, cfg){
  // Use first col as name, scan all cols for status-like values
  const nameKey = headers[0];
  let pending=0,complete=0,issues=0,total=rows.length;
  const callouts=[],tableRows=[];
  const ISSUE_WORDS  =["fail","error","issue","problem","reject","missing","incomplete","overdue","n/a","tbd","not ","pending","hold","stall"];
  const DONE_WORDS   =["complete","done","active","approved","pass","yes","set up","validated","ok","signed","received"];
  rows.forEach(row=>{
    const name = row[nameKey]||Object.values(row)[0]||"";
    if(!name.trim()) return;
    const allVals = Object.values(row).join(" ").toLowerCase();
    let rowClass="";
    if(ISSUE_WORDS.some(w=>allVals.includes(w))){
      issues++;rowClass="row-warning";
      const flagged = Object.entries(row).filter(([k,v])=>ISSUE_WORDS.some(w=>v.toLowerCase().includes(w))).map(([k,v])=>k+": "+v).join("; ");
      callouts.push({level:"warning",title:name,detail:flagged||"Needs review"});
    } else if(DONE_WORDS.some(w=>allVals.includes(w))){
      complete++;rowClass="row-ok";
    } else { pending++; }
    tableRows.push({rowClass,cols:headers.slice(0,6).map(h=>row[h]||"")});
  });
  const summary = total===0?"No data found.":total+" properties — "+complete+" complete, "+pending+" pending, "+issues+" flagged.";
  return{summary,callouts,stats:[
    {label:"Total",value:total,color:cfg.color},
    {label:"✅ Complete",value:complete,color:"#16a34a"},
    {label:"⏳ Pending",value:pending,color:"#64748b"},
    {label:"⚠️ Flagged",value:issues,color:"#b45309"},
  ],tableHeaders:headers.slice(0,6),tableRows};
}

function analyzeVegetation(tabName, {headers, rows}, cfg){
  const nameKey   = findCol(headers, "address")||findCol(headers,"property")||headers[0];
  const statusKey = findCol(headers, "status")||findCol(headers,"result")||findCol(headers,"pass");

  let pass=0,fail=0,pending=0,total=rows.length;
  const callouts=[], tableRows=[];

  const FAIL_WORDS=["fail","no","issue","overdue","incomplete","missing","needs"];
  const PASS_WORDS=["pass","yes","ok","complete","done","approved"];

  rows.forEach(row=>{
    const name  = nameKey   ? row[nameKey]   : Object.values(row)[0]||"";
    const status= statusKey ? (row[statusKey]||"").toLowerCase() : "";

    let rowClass="";
    if(FAIL_WORDS.some(w=>status.includes(w))){
      fail++;rowClass="row-critical";
      callouts.push({level:"critical",title:name||"Property",detail:"Audit status: "+(row[statusKey]||"Failed — action required")});
    } else if(PASS_WORDS.some(w=>status.includes(w))){
      pass++;rowClass="row-ok";
    } else {
      pending++;
    }

    tableRows.push({rowClass, cols: headers.slice(0,5).map(h=>row[h]||"")});
  });

  callouts.sort((a,b)=>({critical:0,warning:1,info:2}[a.level]??2)-({critical:0,warning:1,info:2}[b.level]??2));

  const summary = total===0
    ? "No data found."
    : total+" properties audited — "+pass+" passed, "+fail+" failed, "+pending+" pending.";

  return {
    summary, callouts,
    stats:[
      {label:"Total",value:total,color:cfg.color},
      {label:"✅ Pass",value:pass,color:"#16a34a"},
      {label:"🔴 Fail",value:fail,color:"#dc2626"},
      {label:"⏳ Pending",value:pending,color:"#64748b"},
    ],
    tableHeaders: headers.slice(0,5),
    tableRows,
  };
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function badge(level){
  const m={critical:{bg:"#fee2e2",c:"#dc2626",i:"🔴"},warning:{bg:"#fef9c3",c:"#b45309",i:"🟡"},info:{bg:"#eff6ff",c:"#2563eb",i:"🔵"}};
  const s=m[level]||m.info;
  return '<span class="badge" style="background:'+s.bg+';color:'+s.c+'">'+s.i+' '+level.toUpperCase()+'</span>';
}

function renderHome(){
  const trackers=[
    {icon:"📋",label:"Permitting Tracker",desc:"Permits expiring soon with action notes",color:"#f59e0b"},
    {icon:"⚡",label:"Utilities ERM",desc:"Utility set up and validation status",color:"#3b82f6"},
    {icon:"🏠",label:"Property Onboarding",desc:"Full onboarding pipeline view",color:"#10b981"},
    {icon:"🌿",label:"Vegetation Audit",desc:"Lawncare audits for AZ and FL",color:"#84cc16"},
  ];
  return `
  <div class="home-hero">
    <div style="font-size:52px;margin-bottom:10px">📊</div>

  </div>
  <div class="card">
    <h2>🎯 What is this dashboard?</h2>
    <p>Pulls live data directly from your Google Sheets trackers and automatically highlights critical items, expiring permits, pending tasks, and failed audits — so your team can act fast without digging through spreadsheets.</p>
  </div>
  <div class="card">
    <h2>📁 Trackers</h2>
    <div class="tracker-grid">
      ${trackers.map(t=>'<div class="tracker-card"><span style="font-size:20px">'+t.icon+'</span><div><div style="font-weight:700;color:'+t.color+';font-size:13px">'+t.label+'</div><div style="color:#64748b;font-size:12px;margin-top:2px">'+t.desc+'</div></div></div>').join("")}
    </div>
  </div>
  <div class="card">
    <h2>🚀 How to use</h2>
    <ol>
      <li>Click any tracker tab at the top</li>
      <li>Live data loads automatically from Google Sheets</li>
      <li>Review callouts: <strong style="color:#dc2626">Critical</strong> → <strong style="color:#b45309">Warning</strong> → <strong style="color:#2563eb">Info</strong></li>
      <li>Scroll down for the full data table</li>
      <li>Dashboard auto-refreshes every 15 minutes</li>
    </ol>
  </div>`;
}

function renderResults(id, allResults){
  const cfg=CONFIGS[id];
  let html=`<div class="tracker-header">
    <div><h2>${id.charAt(0).toUpperCase()+id.slice(1)} Tracker</h2><div class="sub">${cfg.desc}</div></div>
    <button class="refresh-btn" onclick="loadTab('${id}',true)">↺ Refresh</button>
  </div>`;

  allResults.forEach(({sheetName,result})=>{
    if(allResults.length>1){
      html+=`<div class="tab-divider" style="color:${cfg.color};border-color:${cfg.color}">${sheetName} <span style="font-size:12px;color:#94a3b8;font-weight:400">· ${result.stats[0]?.value||0} rows</span></div>`;
    }

    // Summary
    html+=`<div class="summary-box" style="background:${cfg.color}12;border:1px solid ${cfg.color}30">📝 ${result.summary}</div>`;

    // Stats
    if(result.stats?.length){
      html+='<div class="stats-row">';
      result.stats.forEach(s=>{
        html+=`<div class="stat-card" style="border:2px solid ${s.color}30"><div class="stat-val" style="color:${s.color}">${s.value}</div><div class="stat-lbl">${s.label}</div></div>`;
      });
      html+='</div>';
    }

    // Callouts + Table: split layout for permitting, standard for others
    if(result.isPermitting){
      html+=`<div style="display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start;margin-top:4px">`;
      // LEFT — callouts panel
      html+=`<div>`;
      if(result.callouts?.length){
        html+=`<div class="callouts-label">Action Callouts</div>`;
        result.callouts.slice(0,30).forEach(c=>{
          const borderColor = c.level==="critical"?"#dc2626":"#f59e0b";
          const bgColor     = c.level==="critical"?"#fff5f5":"#fffbeb";
          html+=`<div class="callout" style="border-left:4px solid ${borderColor};background:${bgColor};margin-bottom:10px">
            <div class="callout-top">${badge(c.level)}<span class="callout-title">${c.title}</span></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px">
              ${c.dateStr?'<span style="background:#f1f5f9;padding:2px 8px;border-radius:6px;color:#475569">📅 '+c.dateStr+'</span>':""}
              ${c.label?'<span style="background:'+(c.level==="critical"?"#fee2e2":"#fef9c3")+';padding:2px 8px;border-radius:6px;font-weight:700;color:'+(c.level==="critical"?"#dc2626":"#b45309")+'">⏱ '+c.label+'</span>':""}
              ${c.status?'<span style="background:#f1f5f9;padding:2px 8px;border-radius:6px;color:#475569">'+c.status+'</span>':""}
            </div>
            ${c.note?'<div style="margin-top:6px;font-size:12px;color:#64748b;background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px">📝 '+c.note+'</div>':""}
          </div>`;
        });
      } else {
        html+=`<div style="color:#64748b;font-size:13px;font-style:italic;padding:20px;text-align:center;background:#f0fdf4;border-radius:10px;border:1px solid #bbf7d0">✅ No critical or expiring permits found.</div>`;
      }
      html+=`</div>`;
      // RIGHT — full table
      html+=`<div><div class="callouts-label">All Permits</div><div class="table-wrap"><table><thead><tr>${result.tableHeaders.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>`;
      result.tableRows.forEach(r=>{
        html+=`<tr class="${r.rowClass}">${r.cols.map((c,i)=>{
          const style = i===4 ? 'style="max-width:200px;white-space:normal;font-size:12px;color:#475569"' : '';
          return '<td '+style+' title="'+c+'">'+c+'</td>';
        }).join('')}</tr>`;
      });
      html+=`</tbody></table></div></div>`;
      html+=`</div>`;
    } else {

    } else {
      if(result.callouts?.length){
        html+='<div class="callouts-label">Action Callouts</div>';
        result.callouts.slice(0,20).forEach(c=>{
          html+=`<div class="callout"><div class="callout-top">${badge(c.level)}<span class="callout-title">${c.title}</span></div><div class="callout-detail">${c.detail}</div></div>`;
        });
      } else {
        html+='<div style="color:#64748b;font-size:13px;font-style:italic;margin-bottom:16px">✅ No critical items found.</div>';
      }
      if(result.tableRows?.length){
        html+=`<div class="callouts-label" style="margin-top:20px">Full Data</div><div class="table-wrap"><table><thead><tr>${result.tableHeaders.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>`;
        result.tableRows.forEach(r=>{
          html+=`<tr class="${r.rowClass}">${r.cols.map(c=>'<td title="'+c+'">'+c+'</td>').join('')}</tr>`;
        });
        html+='</tbody></table></div>';
      }
    }
  });

  return html;
}

// ─────────────────────────────────────────────
//  TAB LOADING
// ─────────────────────────────────────────────
const cache={};
let activeTab="home";

async function loadTab(id, force=false){
  const el=document.getElementById("content");
  if(id==="home"){el.innerHTML=renderHome();return;}
  if(cache[id]&&!force){el.innerHTML=renderResults(id,cache[id]);return;}

  const cfg=CONFIGS[id];
  el.innerHTML=`<div class="state-box"><div class="spinner"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading ${id} data…</div><div style="font-size:13px;color:#94a3b8;margin-top:6px">Fetching from Google Sheets</div></div>`;

  try{
    const allResults=[];
    for(const sheet of cfg.sheets){
      const data=await fetchSheet(cfg.sheetId,sheet.range);
      const result=cfg.analyze(sheet.name,data,cfg);
      allResults.push({sheetName:sheet.name,result});
    }
    cache[id]=allResults;
    el.innerHTML=renderResults(id,allResults);
    document.getElementById("last-updated").textContent="Updated "+new Date().toLocaleTimeString();
  } catch(e){
    el.innerHTML=`<div class="state-box">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-weight:700;color:#dc2626;font-size:15px">Could not load data</div>
      <div class="err-msg">${e.message}</div>
      <button class="retry-btn" style="color:${cfg.color};border-color:${cfg.color}" onclick="loadTab('${id}',true)">↺ Try Again</button>
    </div>`;
  }
}

// ─────────────────────────────────────────────
//  TAB BAR
// ─────────────────────────────────────────────
function renderTabBar(){
  document.getElementById("tabbar").innerHTML=TABS.map(t=>
    `<button style="--c:${t.color}" class="${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function switchTab(id){
  activeTab=id;
  renderTabBar();
  loadTab(id);
}

// ─────────────────────────────────────────────
//  AUTO REFRESH
// ─────────────────────────────────────────────
setInterval(()=>{
  Object.keys(cache).forEach(id=>delete cache[id]); // clear cache
  if(activeTab!=="home") loadTab(activeTab,true);
}, REFRESH_MS);

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderTabBar();
loadTab("home");
</script>
