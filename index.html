<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Techvestor Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0a1628;--navy2:#112240;--blue:#1a73e8;--accent:#00c9a7;--bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--critical:#dc2626;--warning:#d97706;--ok:#16a34a;--purple:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.hdr{background:var(--navy);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;height:58px;border-bottom:1px solid rgba(255,255,255,.07)}
.hdr img{height:26px;object-fit:contain}
.hdr-div{width:1px;height:22px;background:rgba(255,255,255,.15)}
.hdr-title{color:#fff;font-weight:700;font-size:14px}
.hdr-sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.upd{color:rgba(255,255,255,.35);font-size:11px}
.abadge{background:rgba(0,201,167,.15);color:var(--accent);border:1px solid rgba(0,201,167,.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;position:sticky;top:58px;z-index:99}
.tabs button{border:none;background:none;padding:13px 15px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Inter',system-ui,sans-serif}
.tabs button:hover{color:var(--text)}
.wrap{padding:22px 18px;max-width:1100px;margin:0 auto}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.search-wrap{position:relative;flex:1}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:'Inter',system-ui,sans-serif;background:#fff;color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-count{font-size:12px;color:var(--muted);white-space:nowrap}
.hero{text-align:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-radius:16px;padding:40px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,201,167,.15),transparent 70%)}
.hero img{height:30px;margin-bottom:14px;filter:brightness(0) invert(1)}
.hero h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}
.hero p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;max-width:480px;margin:0 auto}
.prop-search-wrap{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:20px;margin-top:20px;position:relative;z-index:1}
.prop-search-label{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.prop-search-wrap input{width:100%;padding:12px 18px;border:none;border-radius:10px;font-size:15px;font-family:'Inter',system-ui,sans-serif;background:#fff;color:var(--text);outline:none;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.prop-results{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.prop-suggestion{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.prop-suggestion:hover{background:rgba(255,255,255,.25)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}
.card p,.card ol{color:#475569;font-size:14px;line-height:1.75}
.card ol{padding-left:18px;line-height:2.1}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;gap:10px}
.trk-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.trk-hdr h2{font-size:18px;font-weight:700;color:var(--text)}
.trk-hdr .sub{color:var(--muted);font-size:13px;margin-top:2px}
.rbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',system-ui,sans-serif}
.tdiv{font-weight:700;font-size:14px;margin-bottom:12px;padding-left:10px;border-left:3px solid}
.tsec{margin-bottom:28px}
.sumbox{border-radius:10px;padding:13px 16px;margin-bottom:14px;font-size:14px;color:#334155;line-height:1.65}
.srow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.scard{background:#fff;border-radius:12px;padding:14px 18px;min-width:110px;text-align:center;flex:1 1 110px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sval{font-size:26px;font-weight:800;line-height:1}
.slbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
.slabel{font-weight:700;font-size:11px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px}
.cbox{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:8px}
.ctop{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ctitle{font-weight:600;color:var(--text);font-size:14px}
.cdet{color:var(--muted);font-size:13px}
.badge{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px}
.split{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.twrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:var(--muted);font-weight:600;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
td{padding:9px 12px;border-bottom:1px solid #f8fafc;color:#334155;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.wr{white-space:normal;font-size:12px;color:#475569;max-width:260px;line-height:1.5}
td a{color:var(--blue);text-decoration:none;font-size:11px}
td a:hover{text-decoration:underline}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
tr.hr{display:none}
.rc td:first-child{border-left:3px solid var(--critical)}
.rw td:first-child{border-left:3px solid var(--warning)}
.ro td:first-child{border-left:3px solid var(--ok)}
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}
[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;z-index:999;pointer-events:none}
.pc{border-radius:10px;padding:12px 14px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin-right:4px;margin-top:4px;font-weight:500}
.nbox{margin-top:8px;font-size:12px;color:#475569;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px;white-space:normal;line-height:1.5}
.util-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:18px;border:2px solid var(--border);border-radius:12px;overflow:hidden}
.util-stat{padding:14px 16px;text-align:center;border-right:1px solid var(--border);background:#fff}
.util-stat:last-child{border-right:none}
.util-stat .ul{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.util-stat .uv{font-size:32px;font-weight:800}
.ref-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ref-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ref-title{font-weight:700;font-size:14px;color:var(--text)}
.ref-toggle{font-size:12px;color:#10b981;background:none;border:1px solid #10b981;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:'Inter',system-ui,sans-serif}
.today-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:12px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
.cc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cc.today{border:2px solid var(--navy);background:#f8faff}
.cc .cd{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.cc .ca{font-weight:700;color:var(--text);font-size:14px;margin-bottom:4px}
.cc .ct{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:6px}
.cc .cx{font-size:13px;color:#475569;line-height:1.5}
.sec-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px}
.chart-title{font-weight:700;font-size:13px;color:var(--text);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text);width:160px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:#f1f5f9;border-radius:4px;height:20px}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#7c3aed,#a855f7)}
.bar-val{font-size:11px;font-weight:700;color:#7c3aed;width:36px;text-align:right;flex-shrink:0}
.pie-wrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.more-btn{margin-top:10px;padding:7px 18px;border-radius:8px;border:1px solid #10b981;background:#fff;color:#10b981;cursor:pointer;font-size:12px;font-family:'Inter',system-ui,sans-serif;font-weight:600}
.prop-profile{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.prop-name{font-size:20px;font-weight:800;color:var(--text)}
.prop-status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:14px 0}
.prop-status-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.prop-status-icon{font-size:22px;margin-bottom:4px}
.prop-status-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.prop-status-val{font-size:13px;font-weight:700;margin-top:2px}
.insights-box{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:1px solid #bae6fd;border-radius:12px;padding:16px;margin-top:14px}
.insights-title{font-size:12px;font-weight:700;color:#0369a1;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.insights-text{font-size:14px;color:#0c4a6e;line-height:1.7}
.ai-loading{display:flex;align-items:center;gap:8px;color:#64748b;font-size:13px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:pulse 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.permit-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.permit-tab-btn{padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',system-ui,sans-serif;transition:all .15s}
.permit-tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.stbox{text-align:center;padding:80px 20px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.permit-lookup-table{width:100%;border-collapse:collapse;margin-top:12px}
.permit-lookup-table th{background:#f8fafc;color:#64748b;font-size:11px;font-weight:700;padding:8px 12px;text-align:left;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.permit-lookup-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:middle}
.permit-lookup-table tr:last-child td{border-bottom:none}
.exp-ok{color:#16a34a;background:#f0fdf4;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.exp-warn{color:#d97706;background:#fffbeb;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.exp-crit{color:#dc2626;background:#fff5f5;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.exp-none{color:#94a3b8;font-size:11px}
@media(max-width:700px){.split{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr}.util-stats{grid-template-columns:1fr 1fr}.pie-wrap{flex-direction:column}}
</style>
</head>
<body>
<div class="hdr">
  <img src="https://cdn.prod.website-files.com/67a629b102d54dc82c9044c0/67a62bfeeec34081b307ec39_techvestor-logo-2.png" alt="Techvestor"/>
  <div class="hdr-div"></div>
  <div><div class="hdr-title">Operations Dashboard</div><div class="hdr-sub" id="hdate"></div></div>
  <div class="hdr-right"><span class="upd" id="upd"></span><span class="abadge">⟳ Auto-refresh 15m</span></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="content"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var KEY = "AIzaSyC8Pa8tBIl17GMtA68ltcx-AGlrUvmtcn8";
var REFRESH = 15 * 60 * 1000;
var TODAY = new Date();
var TODAYSTR = TODAY.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
var TODAYDATE = TODAY.toDateString();
var PERM_SHEETID = "1Ex7gyGxpTvbDBQMD2PNfivYbea0YmOEDKO5innwPBZg";

document.getElementById("hdate").textContent = "Live · " + TODAYSTR;

var TABS = [
  { id: "home",       label: "🏠 Home",                  color: "#6366f1" },
  { id: "master",     label: "📊 Master Tracker",         color: "#0ea5e9" },
  { id: "permitting", label: "📋 Permitting Callouts",    color: "#f59e0b" },
  { id: "utilities",  label: "⚡ Utilities ERM",          color: "#3b82f6" },
  { id: "onboarding", label: "🏠 Property Onboarding",    color: "#10b981" },
  { id: "vegetation", label: "🌿 Vegetation Audit",       color: "#84cc16" },
  { id: "complaints", label: "📣 Complaints & Incidents", color: "#6366f1" },
  { id: "security",   label: "🔒 Security Monitoring",    color: "#7c3aed" },
];

var CFG = {
  master:     { sheetId: PERM_SHEETID, color: "#0ea5e9", desc: "Master Tracker — permit counts, market breakdown & Dropbox links" },
  permitting: { sheetId: PERM_SHEETID, color: "#f59e0b", desc: "Expiration tab — permits expiring soon with notes", sheets: [{ name: "Expiration", range: "Expiration" }] },
  utilities:  { sheetId: "1bPlzWPzarOI03QO1_LqUrhlrxM8AMc2MPrQHiYrPCns", color: "#3b82f6", desc: "SUMMARY tab — live utility status overview", sheets: [{ name: "SUMMARY", range: "SUMMARY" }] },
  onboarding: { sheetId: "13JffxAKNLUaPm2n1iBWNCL48k-7CCEaf4xwu0xgjZN4", color: "#10b981", desc: "Ref Timeline + all property onboarding tabs", sheets: [], refSheet: "Ref Timeline" },
  vegetation: { sheetId: "1omzFAmQLUUk-g9tOd9b3fm9NbnxhXVbnGUQXUb6-6mg", color: "#84cc16", desc: "Lawncare Audit AZ & FL — sorted by most recent", sheets: [{ name: "Lawncare Audit AZ", range: "Lawncare Audit AZ" }, { name: "Lawncare Audit FL", range: "Lawncare Audit FL" }] },
  complaints: { sheetId: "1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs", color: "#6366f1", desc: "Neighbor Complaint / Incident Log", sheets: [] },
  security:   { sheetId: "1paLwVY6YjcSeGmkE6L0jBYFScxpq0jyxL_bfd4BhyOs", color: "#7c3aed", desc: "Noise Alert Logs — alerts & Hospitable links", sheets: [] },
};

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchSheet(sheetId, range) {
  var url = "https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "/values/" + encodeURIComponent(range) + "?key=" + KEY;
  var r = await fetch(url);
  if (!r.ok) { var b = await r.json().catch(function () { return {}; }); throw new Error((b.error && b.error.message) || "HTTP " + r.status); }
  return (await r.json()).values || [];
}

async function fetchMeta(sheetId) {
  var r = await fetch("https://sheets.googleapis.com/v4/spreadsheets/" + sheetId + "?key=" + KEY);
  if (!r.ok) throw new Error("Could not load metadata");
  return ((await r.json()).sheets || [])
    .filter(function (s) { return s.properties && !s.properties.hidden; })
    .map(function (s) { return { title: s.properties.title }; });
}

async function callClaude(prompt) {
  var resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, messages: [{ role: "user", content: prompt }] })
  });
  var data = await resp.json();
  return (data.content || []).map(function (b) { return b.text || ""; }).join("");
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function pdate(s) { if (!s) return null; var d = new Date(s); return isNaN(d.getTime()) ? null : d; }
function ddiff(d) { return Math.round((d.getTime() - TODAY.getTime()) / 86400000); }
function isToday(d) { return d && d.toDateString() === TODAYDATE; }
function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function lnk(url, label) { if (!url || !url.startsWith("http")) return esc(url || ""); return '<a href="' + esc(url) + '" target="_blank">' + esc(label) + '</a>'; }
function badge(lv) { var m = { critical: { bg: "#fee2e2", c: "#dc2626", i: "🔴" }, warning: { bg: "#fef9c3", c: "#d97706", i: "🟡" }, info: { bg: "#eff6ff", c: "#2563eb", i: "🔵" } }; var s = m[lv] || m.info; return '<span class="badge" style="background:' + s.bg + ';color:' + s.c + '">' + s.i + ' ' + lv.toUpperCase() + '</span>'; }
function cv(row, i) { return ((row && row[i]) || "").trim(); }
function isYes(v) { var l = (v || "").trim().toLowerCase(); return l === "yes" || l === "y"; }
function statCards(stats) {
  return '<div class="srow">' + stats.map(function (s) {
    return '<div class="scard" style="border:2px solid ' + s.color + '30"><div class="sval" style="color:' + s.color + '">' + s.value + '</div><div class="slbl">' + s.label + '</div></div>';
  }).join("") + '</div>';
}

// Expiry badge for property lookup table
function expBadge(dateStr, label) {
  if (!dateStr) return '<span class="exp-none">—</span>';
  var d = pdate(dateStr);
  if (!d) return '<span class="exp-none">' + esc(dateStr) + '</span>';
  var diff = ddiff(d);
  var cls = diff < 0 ? "exp-crit" : diff <= 30 ? "exp-crit" : diff <= 90 ? "exp-warn" : "exp-ok";
  var lbl = label || (diff < 0 ? "EXPIRED" : diff + "d left");
  return '<span class="' + cls + '">' + esc(dateStr) + '</span> <span style="font-size:11px;color:#94a3b8">' + esc(lbl) + '</span>';
}

// ── MASTER TRACKER ANALYSIS ────────────────────────────────────────────────────
// MASTER TRACKER 1 layout (confirmed from sheet):
//   Row 1 (idx 0) = "Confluence" / merge header
//   Row 2 (idx 1) = column headers: Col A=Property, Col B=Market, Col C=OVERALL STATUS, Col V=STATE
//   Row 3+ (idx 2+) = data
// Col B(1) = Market name (Memphis, McGaheysville, Scottsdale, etc.)
// Col C(2) = OVERALL STATUS — count rows where value is exactly "Active" (case-insensitive)
// Col V(21) = STATE — count rows where value is "YES" (Yes/yes/YES)
function analyzeMasterStats(rr) {

function analyzePermitting(rr) {
  if (!rr || rr.length < 2) return { mode: "permitting", summary: "No data.", stats: [], callouts: [], tH: ["Property Name", "Expiration Date", "Notes", "Last Updated"], tR: [] };
  var headers = rr[0].map(function (h) { return (h || "").trim(); });
  var expIdx = 1, notesIdx = 8, updIdx = -1;
  headers.forEach(function (h, i) { var hl = h.toLowerCase(); if (hl.includes("expir")) expIdx = i; if (updIdx === -1 && (hl.includes("updated") || hl.includes("last update"))) updIdx = i; });
  var critical = 0, warning = 0, ok = 0, callouts = [], tR = [];
  rr.slice(1).forEach(function (row) {
    var name = cv(row, 0), dateStr = cv(row, expIdx), notes = cv(row, notesIdx), updated = updIdx >= 0 ? cv(row, updIdx) : "";
    if (!name && !dateStr) return;
    var d2 = pdate(dateStr), diff = d2 ? ddiff(d2) : null, lv = "ok", label = "", rc = "ro";
    if (diff !== null) { if (diff < 0) { lv = "critical"; label = "EXPIRED"; critical++; rc = "rc"; } else if (diff <= 30) { lv = "critical"; label = diff + "d left"; critical++; rc = "rc"; } else if (diff <= 90) { lv = "warning"; label = diff + "d left"; warning++; rc = "rw"; } else ok++; } else ok++;
    if (lv === "critical" || lv === "warning") callouts.push({ lv: lv, name: name, dateStr: dateStr, label: label, notes: notes, updated: updated });
    tR.push({ rc: rc, prop: name, cols: [name, dateStr, notes, updated] });
  });
  callouts.sort(function (a, b) { return ({ critical: 0, warning: 1 }[a.lv] || 0) - ({ critical: 0, warning: 1 }[b.lv] || 0); });
  var tot = tR.length;
  return {
    mode: "permitting",
    summary: tot === 0 ? "No data." : critical + " critical/expired, " + warning + " expiring ≤90d, " + ok + " OK of " + tot + " total.",
    stats: [{ label: "Total", value: tot, color: "#f59e0b" }, { label: "🔴 Critical", value: critical, color: "#dc2626" }, { label: "🟡 Warning", value: warning, color: "#d97706" }, { label: "✅ OK", value: ok, color: "#16a34a" }],

}

function filterTable(tabId) {

function renderPieChart(marketData) {

  var total = marketData.reduce(function (s, m) { return s + m.count; }, 0); // full total, not just top 10

  var colors = ["#0ea5e9", "#7c3aed", "#f59e0b", "#10b981", "#dc2626", "#3b82f6", "#84cc16", "#6366f1", "#d97706", "#06b6d4"];
  var size = 180, cx = 90, cy = 90, r = 70, slices = "", angle = -Math.PI / 2;
  top.forEach(function (m, i) {
    var frac = m.count / total, sweep = frac * 2 * Math.PI - 0.02;
    var x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    angle += sweep + 0.02;
    var x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
    slices += '<path d="M' + cx + ',' + cy + ' L' + x1.toFixed(1) + ',' + y1.toFixed(1) + ' A' + r + ',' + r + ' 0 ' + (sweep > Math.PI ? 1 : 0) + ',1 ' + x2.toFixed(1) + ',' + y2.toFixed(1) + ' Z" fill="' + colors[i % colors.length] + '" opacity="0.9"><title>' + esc(m.name) + ': ' + m.count + '</title></path>';
  });
  slices += '<circle cx="' + cx + '" cy="' + cy + '" r="32" fill="white"/>'
    + '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" font-size="11" fill="#64748b" font-family="Inter,sans-serif">Total</text>'
    + '<text x="' + cx + '" y="' + (cy + 10) + '" text-anchor="middle" font-size="18" font-weight="800" fill="#1e293b" font-family="Inter,sans-serif">' + total + '</text>';
  var legend = top.map(function (m, i) {
    return '<div class="pie-legend-item"><div class="pie-dot" style="background:' + colors[i % colors.length] + '"></div><span style="flex:1">' + esc(m.name) + '</span><strong>' + m.count + '</strong></div>';
  }).join("");
  return '<div class="chart-wrap"><div class="chart-title">🗺 Top Markets by Property Count</div><div class="pie-wrap"><svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' + slices + '</svg><div class="pie-legend">' + legend + '</div></div></div>';
}

// ── PROPERTY SEARCH ───────────────────────────────────────────────────────────
var allPropertyNames = [];

function collectAllProperties() {
  var names = {};
  Object.values(globalCache).forEach(function (c) {
    if (!c || !c.results) return;
    c.results.forEach(function (ar) {
      var R = ar.result; if (!R) return;
      if (R.tR) R.tR.forEach(function (r) { if (r.prop && r.prop.trim().length > 2) names[r.prop.trim()] = true; });
      if (R.hoaRows) R.hoaRows.forEach(function (r) { if (r.prop && r.prop.trim().length > 2) names[r.prop.trim()] = true; });
      if (R.cityRows) R.cityRows.forEach(function (r) { if (r.prop && r.prop.trim().length > 2) names[r.prop.trim()] = true; });
      if (R.countyRows) R.countyRows.forEach(function (r) { if (r.prop && r.prop.trim().length > 2) names[r.prop.trim()] = true; });
      if (R.stateRows) R.stateRows.forEach(function (r) { if (r.prop && r.prop.trim().length > 2) names[r.prop.trim()] = true; });
      if (R.properties) R.properties.forEach(function (p) { if (p.name && p.name.trim().length > 2) names[p.name.trim()] = true; });
      [].concat(R.todayItems || [], R.recentItems || [], R.olderItems || []).forEach(function (i) { if (i.prop && i.prop.trim().length > 2) names[i.prop.trim()] = true; });
    });
  });
  allPropertyNames = Object.keys(names).sort();
}

function onPropSearch() {
  var q = (document.getElementById("prop-search-input").value || "").toLowerCase().trim();
  var sug = document.getElementById("prop-suggestions"); if (!sug) return;
  if (!q) { sug.innerHTML = ""; return; }
  var matches = allPropertyNames.filter(function (n) { return n.toLowerCase().includes(q); }).slice(0, 10);
  if (!matches.length) { sug.innerHTML = '<span style="color:rgba(255,255,255,.5);font-size:12px">No matches — try loading tracker tabs first</span>'; return; }
  sug.innerHTML = matches.map(function (n) {
    var lower = n.toLowerCase(), idx = lower.indexOf(q);
    var highlighted = idx >= 0
      ? esc(n.slice(0, idx)) + '<strong>' + esc(n.slice(idx, idx + q.length)) + '</strong>' + esc(n.slice(idx + q.length))
      : esc(n);
    return '<span class="prop-suggestion" onclick="lookupProperty(\'' + n.replace(/\\/g, "\\\\").replace(/'/g, "\\'") + '\')" title="' + esc(n) + '">' + highlighted + '</span>';
  }).join("");
}

function lookupProperty(name) {
  document.getElementById("prop-search-input").value = name;
  document.getElementById("prop-suggestions").innerHTML = "";
  var el = document.getElementById("prop-profile-result");
  el.innerHTML = '<div class="prop-profile"><div class="prop-name">🏠 ' + esc(name) + '</div><div style="margin-top:12px"><div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Gathering data across all trackers…</span></div></div></div>';
  setTimeout(function () { buildPropertyProfile(name, el); }, 100);
}

// ── PERMIT LOOKUP TABLE ───────────────────────────────────────────────────────
// Pulls from each permit tab separately. Shows:
// Row 1: Property Name (searched)
// Row 2: HOA/Township — expire date — all dropbox link
// Row 3: City — expire date — all dropbox link
// Row 4: County — expire date — all dropbox link
// Row 5: State — expire date — all dropbox link
function renderPermitLookup(name, masterData) {
  if (!masterData) {
    return '<div style="color:#94a3b8;font-size:13px;font-style:italic;padding:8px 0">Load the Master Tracker tab first for permit details.</div>';
  }
  var nl = name.toLowerCase();
  var types = [
    { label: "🏘 HOA / Township", rows: masterData.hoaRows },
    { label: "🏙 City",            rows: masterData.cityRows },
    { label: "🗺 County",          rows: masterData.countyRows },
    { label: "🏛 State",           rows: masterData.stateRows },
  ];

  var html = '<div class="twrap"><table>'
    + '<thead><tr>'
    + '<th style="width:180px">Permit Type</th>'
    + '<th style="width:180px">Expire Date</th>'
    + '<th>All Permits (Dropbox)</th>'
    + '</tr></thead><tbody>';

  // Property name header row
  html += '<tr style="background:#f8fafc">'
    + '<td colspan="3" style="font-weight:800;color:#1e293b;font-size:14px;padding:10px 12px">🏠 ' + esc(name) + '</td>'
    + '</tr>';

  types.forEach(function (t) {
    var matches = (t.rows || []).filter(function (r) {
      return r.prop && r.prop.toLowerCase().includes(nl);
    });

    if (!matches.length) {
      html += '<tr>'
        + '<td style="font-weight:600;color:#475569">' + t.label + '</td>'
        + '<td><span style="color:#94a3b8;font-size:12px">No record found</span></td>'
        + '<td><span style="color:#94a3b8">—</span></td>'
        + '</tr>';
      return;
    }

    // If multiple matches (e.g. same property in multiple rows), show each
    matches.forEach(function (r, i) {
      var expCell = r.expDate
        ? expBadge(r.expDate, r.label)
        : '<span style="color:#94a3b8;font-size:12px">No date</span>';
      var dbCell = (r.dbAll && r.dbAll.startsWith("http"))
        ? lnk(r.dbAll, "📁 All Permits")
        : '<span style="color:#94a3b8">—</span>';
      html += '<tr class="' + (r.rc || "") + '">'
        + '<td style="font-weight:600;color:#475569">' + (i === 0 ? t.label : '') + '</td>'
        + '<td>' + expCell + '</td>'
        + '<td>' + dbCell + '</td>'
        + '</tr>';
    });
  });

  html += '</tbody></table></div>';
  return html;
}

async function buildPropertyProfile(name, el) {
  var nl = name.toLowerCase();
  var found = { utilities: [], vegetation: [], complaints: [], security: null, securityRows: [] };
  var masterData = null;

  Object.entries(globalCache).forEach(function (entry) {
    var id = entry[0], c = entry[1]; if (!c || !c.results) return;
    c.results.forEach(function (ar) {
      var R = ar.result; if (!R) return;
      // Master tracker — grab permit rows + store ref
      if (id === "master") { masterData = R; return; }
      // Utilities & vegetation from tR
      if (R.tR) R.tR.forEach(function (r) {
        if (!r.prop || !r.prop.toLowerCase().includes(nl)) return;
        if (id === "utilities") found.utilities.push(r);
        if (id === "vegetation") found.vegetation.push(r);
      });
      // Security — check both property cards and raw rows
      if (id === "security" && R.mode === "security") {
        if (R.properties) R.properties.forEach(function (p) {
          if (p.name && p.name.toLowerCase().includes(nl)) found.security = p;
        });
        [].concat(R.todayRows || [], R.recentRows || [], R.properties ? [] : []).forEach(function (r) {
          if (r && r.prop && r.prop.toLowerCase().includes(nl)) found.securityRows.push(r);
        });
      }
      // Complaints
      if (id === "complaints" && R.mode === "complaints") {
        [].concat(R.todayItems || [], R.recentItems || [], R.olderItems || []).forEach(function (i) {
          if ((i.prop || "").toLowerCase().includes(nl) || (i.listing || "").toLowerCase().includes(nl)) found.complaints.push(i);
        });
      }
    });
  });

  // Permit summary from master rows
  var permitRows = masterData ? [].concat(
    (masterData.hoaRows || []).filter(function (r) { return r.prop && r.prop.toLowerCase().includes(nl); }),
    (masterData.cityRows || []).filter(function (r) { return r.prop && r.prop.toLowerCase().includes(nl); }),
    (masterData.countyRows || []).filter(function (r) { return r.prop && r.prop.toLowerCase().includes(nl); }),
    (masterData.stateRows || []).filter(function (r) { return r.prop && r.prop.toLowerCase().includes(nl); })
  ) : [];
  var hasPermitIssue = permitRows.some(function (r) { return r.rc === "rc"; });
  var permitStatus = !masterData ? "— Load Master tab" : permitRows.length === 0 ? "No records" : hasPermitIssue ? "⚠️ " + permitRows.filter(function (r) { return r.rc === "rc"; }).length + " critical" : "✅ " + permitRows.length + " permit(s) OK";
  var vegFail = found.vegetation.some(function (r) { return r.rc === "rc"; });
  var vegStatus = found.vegetation.length === 0 ? "— Load Vegetation tab" : vegFail ? "🔴 Needs service" : "✅ Pass";
  var secCount = found.security ? found.security.count : 0;
  var secStatus = secCount > 0 ? "🔔 " + secCount + " total alerts" : "✅ No alerts";
  var compStatus = found.complaints.length === 0 ? "✅ None" : "⚠️ " + found.complaints.length + " complaint(s)";
  var utilIssue = found.utilities.some(function (r) { return r.rc === "rw"; });
  var utilStatus = found.utilities.length === 0 ? "— Load Utilities tab" : utilIssue ? "⚠️ Issues found" : "✅ OK";

  var cards = [
    { icon: "📋", label: "Permitting", val: permitStatus, color: hasPermitIssue ? "#dc2626" : "#16a34a" },
    { icon: "⚡", label: "Utilities",  val: utilStatus,   color: utilIssue ? "#d97706" : "#16a34a" },
    { icon: "🌿", label: "Vegetation", val: vegStatus,    color: vegFail ? "#dc2626" : "#16a34a" },
    { icon: "🔒", label: "Security",   val: secStatus,    color: secCount >= 5 ? "#dc2626" : secCount >= 3 ? "#d97706" : "#16a34a" },
    { icon: "📣", label: "Incidents",  val: compStatus,   color: found.complaints.length ? "#d97706" : "#16a34a" },
  ];

  var html = '<div class="prop-profile">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px"><div class="prop-name">🏠 ' + esc(name) + '</div><div style="font-size:11px;color:#94a3b8">' + TODAYSTR + '</div></div>';
  html += '<div class="prop-status-grid">' + cards.map(function (c) {
    return '<div class="prop-status-card"><div class="prop-status-icon">' + c.icon + '</div><div class="prop-status-label">' + c.label + '</div><div class="prop-status-val" style="color:' + c.color + '">' + c.val + '</div></div>';
  }).join("") + '</div>';

  // Simplified permit table
  html += '<div class="slabel" style="margin-top:16px">Permit Summary</div>';
  html += renderPermitLookup(name, masterData);

  if (found.complaints.length) { html += '<div class="slabel" style="margin-top:14px">Recent Incidents</div>'; found.complaints.slice(0, 3).forEach(function (i) { html += renderComplaintCard(i, false); }); }
  if (found.security) {
    var p = found.security;
    html += '<div style="margin-top:10px;padding:12px 16px;background:#f5f3ff;border:1px solid #e9d5ff;border-radius:10px">'
      + '<div style="font-weight:700;color:#7c3aed;margin-bottom:6px">🔒 Security Summary</div>'
      + '<div style="font-size:13px;color:#475569"><strong>' + p.count + '</strong> noise alerts'
      + (p.latestDateStr ? ' · Last: <strong>' + esc(p.latestDateStr) + '</strong>' : "")
      + (p.guests && p.guests.length ? ' · Guest(s): ' + esc(p.guests.slice(0, 2).join(", ")) : "") + '</div>'
      + (p.hospiLink ? '<div style="margin-top:6px">' + lnk(p.hospiLink, "🔗 Hospitable") + '</div>' : "") + '</div>';
  }
  if (found.vegetation.length) {
    html += '<div style="margin-top:10px;padding:12px 16px;background:' + (vegFail ? "#fff5f5" : "#f0fdf4") + ';border:1px solid ' + (vegFail ? "#fecaca" : "#bbf7d0") + ';border-radius:10px">'
      + '<div style="font-weight:700;color:' + (vegFail ? "#dc2626" : "#16a34a") + ';margin-bottom:4px">🌿 Vegetation</div>'
      + '<div style="font-size:13px;color:#475569">' + found.vegetation[0].cols.filter(Boolean).map(function (c) { return esc(c); }).join(' · ') + '</div></div>';
  }

  html += '<div class="insights-box" style="margin-top:16px"><div class="insights-title">✨ AI Insights & Recommendations</div>'
    + '<div class="insights-text" id="ai-insights-text"><div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Analyzing data for ' + esc(name) + '…</span></div></div></div>';
  html += '</div>';
  el.innerHTML = html;

  try {
    var ctx = "PROPERTY: " + name + "\nDATE: " + TODAYSTR + "\n\n";
    ctx += "=== PERMITS (Master Tracker) ===\n";
    if (permitRows.length) permitRows.slice(0, 8).forEach(function (r) { ctx += "- " + r.prop + " | Expires: " + (r.expDate || "N/A") + " | Status: " + (r.label || "OK") + "\n"; });
    else ctx += "No permit data loaded.\n";
    ctx += "\n=== UTILITIES ===\n";
    if (found.utilities.length) found.utilities.slice(0, 5).forEach(function (r) { ctx += "- " + r.cols.join(" | ") + "\n"; });
    else ctx += "No utility data loaded.\n";
    ctx += "\n=== VEGETATION ===\n";
    if (found.vegetation.length) found.vegetation.slice(0, 3).forEach(function (r) { ctx += "- " + r.cols.join(" | ") + "\n"; });
    else ctx += "No vegetation data loaded.\n";
    ctx += "\n=== SECURITY ===\n";
    if (found.security) {
      ctx += "Total alerts: " + found.security.count + "\nLast alert: " + (found.security.latestDateStr || "unknown") + "\n";
      if (found.securityRows.length) { ctx += "Recent:\n"; found.securityRows.slice(0, 3).forEach(function (r) { ctx += "  " + r.dateStr + ": 1st: " + (r.a1 || "—") + " | 2nd: " + (r.a2 || "—") + " | Actions: " + (r.actionsDone || "none") + "\n"; }); }
    } else ctx += "No security data loaded.\n";
    ctx += "\n=== COMPLAINTS ===\n";
    if (found.complaints.length) found.complaints.slice(0, 5).forEach(function (i) { ctx += "- " + i.dateStr + " | " + i.neighbor + " | " + i.complaint + " | Action: " + (i.action || "none") + "\n"; });
    else ctx += "No complaints.\n";

    var prompt = "You are an expert operations analyst for Techvestor, a short-term rental company. Analyze this property data and give a concise, actionable report.\n\n" + ctx
      + "\nProvide:\n1. **Overall Status** — 1-2 sentences on operational health\n2. **Key Issues** — urgent items needing attention with dates/numbers\n3. **Recommendations** — specific next steps with priority\n4. **Positive Notes** — what's working well\n\nUse • for bullets, **bold** for headers. Reference actual data.";
    var insights = await callClaude(prompt);
    var insightEl = document.getElementById("ai-insights-text");
    if (insightEl) {
      var fmt = insights
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/^• /gm, '<span style="color:#0369a1">•</span> ')
        .replace(/\n\n/g, "</p><p style='margin-top:8px'>")
        .replace(/\n/g, "<br/>");
      insightEl.innerHTML = "<p>" + fmt + "</p>";
    }
  } catch (e) {
    var insightEl = document.getElementById("ai-insights-text");
    if (insightEl) insightEl.innerHTML = '<span style="color:#64748b">Load tracker tabs first, then search again for AI insights.</span>';
  }
}

// ── TOGGLES ───────────────────────────────────────────────────────────────────
function toggleRef() {
  var el = document.getElementById("ref-extra"), btn = document.getElementById("ref-toggle-btn");
  if (!el || !btn) return;
  var open = el.style.display !== "none";
  el.style.display = open ? "none" : "";
  btn.textContent = open ? "Show All" : "Show Less";
}
function toggleOb(uid) {
  var el = document.getElementById("ob-more-" + uid), btn = document.getElementById("ob-btn-" + uid);
  if (!el || !btn) return;
  var open = el.style.display !== "none";
  el.style.display = open ? "none" : "";
  btn.textContent = open ? "Show More" : "Show Less";
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
var globalCache = {}, activeTab = "home";

async function loadTab(id, force) {
  var el = document.getElementById("content");
  if (id === "home") { el.innerHTML = renderHome(); collectAllProperties(); return; }
  if (globalCache[id] && !force) { el.innerHTML = renderResults(id, globalCache[id].results, globalCache[id].extra); return; }
  var cfg = CFG[id];
  el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading data…</div></div>';
  try {
    var allResults = [], extra = {};
    if (id === "master") {
      el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading Master Tracker stats…</div></div>';
      // MASTER TRACKER 1: Col B(1)=Market, Col C(2)=Active, Col V(21)=State — data starts row 3 (index 2)
      var masterRR = await fetchSheet(PERM_SHEETID, "MASTER TRACKER 1");
      var statsData = analyzeMasterStats(masterRR);

      el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading HOA / Township permits…</div></div>';
      var hoaRR = []; try { hoaRR = await fetchSheet(PERM_SHEETID, "HOA / Township Only"); } catch (e) { console.warn("HOA tab:", e.message); }

      el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading City permits…</div></div>';
      var cityRR = []; try { cityRR = await fetchSheet(PERM_SHEETID, "City Only"); } catch (e) { console.warn("City tab:", e.message); }

      el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading County permits…</div></div>';
      var countyRR = []; try { countyRR = await fetchSheet(PERM_SHEETID, "County Only"); } catch (e) { console.warn("County tab:", e.message); }

      el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading State permits…</div></div>';
      var stateRR = []; try { stateRR = await fetchSheet(PERM_SHEETID, "State Only"); } catch (e) { console.warn("State tab:", e.message); }

      var result = {
        mode: "master",
        summary: statsData.total + " properties tracked. Active: " + statsData.active + ". HOA/Township: " + statsData.hoa + ", City: " + statsData.city + ", County: " + statsData.county + ", State: " + statsData.state + ".",
        stats: [
          { label: "Total",             value: statsData.total,   color: "#0ea5e9" },
          { label: "✅ Active",         value: statsData.active,  color: "#16a34a" },
          { label: "🏘 HOA/Township",   value: statsData.hoa,     color: "#7c3aed" },
          { label: "🏙 City",           value: statsData.city,    color: "#f59e0b" },
          { label: "🗺 County",         value: statsData.county,  color: "#10b981" },
          { label: "🏛 State",          value: statsData.state,   color: "#3b82f6" },
        ],
        marketData:    statsData.marketData,
        hoaRows:       analyzeHOA(hoaRR),
        cityRows:      analyzeCity(cityRR),
        countyRows:    analyzeCounty(countyRR),
        stateRows:     analyzeState(stateRR),
        activePermitType: "hoa",
      };
      allResults.push({ sheetName: "Master Tracker", result: result });

    } else if (id === "onboarding") {
      try { var rd = await fetchSheet(cfg.sheetId, "Ref Timeline"); extra.ref = parseRefTimeline(rd); } catch (e) { extra.ref = null; }
      var metas = await fetchMeta(cfg.sheetId);
      var propSheets = metas.filter(function (s) { return s.title !== "Ref Timeline"; });
      for (var i = 0; i < propSheets.length; i++) {
        var s = propSheets[i];
        el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading "' + s.title + '"…</div></div>';
        var d = await fetchSheet(cfg.sheetId, s.title);
        allResults.push({ sheetName: s.title, result: analyzeOnboarding(d) });
      }
    } else if (id === "complaints") {
      var metas2 = await fetchMeta(cfg.sheetId);
      var ct = metas2.find(function (s) { var t = s.title.toLowerCase(); return t.includes("neighbor") || t.includes("complaint") || t.includes("guest"); });
      if (!ct) throw new Error("Complaints tab not found. Available: " + metas2.map(function (s) { return s.title; }).join(", "));
      var cd = await fetchSheet(cfg.sheetId, ct.title);
      allResults.push({ sheetName: ct.title, result: analyzeComplaints(cd) });
    } else if (id === "security") {
      var metas3 = await fetchMeta(cfg.sheetId);
      var st = metas3.find(function (s) { var t = s.title.toLowerCase(); return t.includes("noise") || t.includes("alert"); });
      if (!st) throw new Error("Noise Alert tab not found.");
      var sd = await fetchSheet(cfg.sheetId, st.title);
      allResults.push({ sheetName: st.title, result: analyzeSecurity(sd) });
    } else if (id === "vegetation") {
      for (var vi = 0; vi < cfg.sheets.length; vi++) {
        var vs = cfg.sheets[vi];
        el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading "' + vs.name + '"…</div></div>';
        var vd = await fetchSheet(cfg.sheetId, vs.range);
        allResults.push({ sheetName: vs.name, result: analyzeVegetation(vs.name, vd) });
      }
    } else {
      for (var gi = 0; gi < cfg.sheets.length; gi++) {
        var gs = cfg.sheets[gi];
        el.innerHTML = '<div class="stbox"><div class="spin"></div><div style="font-size:15px;font-weight:600;color:#334155">Loading "' + gs.name + '"…</div></div>';
        var gd = await fetchSheet(cfg.sheetId, gs.range);
        var result = id === "permitting" ? analyzePermitting(gd) : id === "utilities" ? analyzeUtilities(gd) : { mode: "standard", summary: "", stats: [], tH: [], tR: [] };
        allResults.push({ sheetName: gs.name, result: result });
      }
    }

    globalCache[id] = { results: allResults, extra: extra };
    el.innerHTML = renderResults(id, allResults, extra);
    document.getElementById("upd").textContent = "Updated " + new Date().toLocaleTimeString();
    collectAllProperties();
  } catch (e) {
    el.innerHTML = '<div class="stbox"><div style="font-size:36px;margin-bottom:12px">⚠️</div>'
      + '<div style="font-weight:700;color:#dc2626;font-size:15px;margin-bottom:6px">Could not load data</div>'
      + '<div style="font-size:13px;color:#64748b;margin:0 auto 16px;max-width:500px">' + esc(e.message) + '</div>'
      + '<button class="rbtn" style="color:' + cfg.color + ';border-color:' + cfg.color + '" onclick="loadTab(\'' + id + '\',true)">↺ Try Again</button></div>';
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map(function (t) {
    var a = t.id === activeTab;
    return '<button style="' + (a ? "color:" + t.color + ";border-bottom-color:" + t.color + ";font-weight:700" : "") + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
  }).join("");
}

function switchTab(id) { activeTab = id; renderTabs(); loadTab(id); }

setInterval(function () {
  Object.keys(globalCache).forEach(function (id) { delete globalCache[id]; });
  if (activeTab !== "home") loadTab(activeTab, true);
}, REFRESH);

renderTabs();
loadTab("home");
</script>
